<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Escape Robin</title>

<style>
:root{
    --bg:#08111f;
    --panel:rgba(15,23,42,.88);
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#38bdf8;
    --danger:#ef4444;
    --success:#10b981;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    background:radial-gradient(circle at top,#13233f,#08111f);
    color:var(--text);
    font-family:Segoe UI,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

#game-container{
    position:relative;
    width:min(95vw,840px);

    border-radius:18px;
    overflow:hidden;

    box-shadow:
        0 20px 70px rgba(0,0,0,.6);
}

canvas{
    display:block;
    width:100%;
    height:auto;
    background:#07101d;
}

.ui-layer{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.75);

    z-index:10;

    text-align:center;

    padding:20px;
}

.hidden{
    display:none!important;
}

h1{
    margin:0;
    font-size:3rem;
    text-transform:uppercase;
}

.robin{
    color:var(--danger);
}

button{
    padding:12px 24px;
    border:none;
    border-radius:10px;

    background:var(--accent);
    color:white;

    cursor:pointer;

    font-weight:bold;
    font-size:1rem;

    margin-top:15px;
}

button:hover{
    filter:brightness(1.1);
}

.character-select{
    display:flex;
    gap:16px;
    margin:24px 0;
    flex-wrap:wrap;
    justify-content:center;
}

.char-card{
    width:120px;
    background:rgba(255,255,255,.06);
    border:2px solid transparent;
    border-radius:12px;
    padding:10px;

    cursor:pointer;

    transition:.2s;
}

.char-card.selected{
    border-color:var(--accent);
}

.char-card:hover{
    transform:translateY(-4px);
}

.char-card img{
    width:100%;
    border-radius:8px;
    aspect-ratio:1/1;
    object-fit:cover;
}

#hud{
    position:absolute;
    top:0;
    left:0;
    width:100%;

    display:flex;
    justify-content:space-between;

    padding:14px;

    z-index:5;

    font-weight:bold;

    background:linear-gradient(to bottom,
        rgba(0,0,0,.7),
        transparent);
}

#anger-bar-container{
    width:180px;
    height:10px;

    background:#333;

    border-radius:999px;

    overflow:hidden;

    margin-top:6px;
}

#anger-bar{
    width:0%;
    height:100%;

    background:linear-gradient(
        90deg,
        #fb7185,
        #ef4444
    );
}
</style>
</head>

<body>

<div id="game-container">

    <div id="hud" class="hidden">

        <div>
            Score:
            <span id="ui-score">0</span>
        </div>

        <div>
            Level:
            <span id="ui-level">1</span>
        </div>

        <div style="text-align:right;">
            Robin Anger
            <div id="anger-bar-container">
                <div id="anger-bar"></div>
            </div>
        </div>
    </div>

    <!-- MENU -->
    <div id="main-menu" class="ui-layer">

        <h1>
            Escape
            <span class="robin">Robin</span>
        </h1>

        <p>Select Character</p>

        <div class="character-select">

            <div class="char-card selected"
                 data-char="leif">

                <img src="leif.jpeg">
                <div>Leif</div>
            </div>

            <div class="char-card"
                 data-char="lennard">

                <img src="lennard.jpeg">
                <div>Lennard</div>
            </div>

            <div class="char-card"
                 data-char="erim">

                <img src="erim.jpeg">
                <div>Erim</div>
            </div>
        </div>

        <button id="start-btn">
            Start Game
        </button>

        <p style="max-width:500px;color:var(--muted)">
            WASD / Arrow Keys to move.<br>
            Hold SHIFT to hide.<br>
            Hidden players cannot move,
            but Robin loses track of you.
        </p>
    </div>

    <!-- GAME OVER -->
    <div id="game-over-menu"
         class="ui-layer hidden">

        <h1>
            Game
            <span class="robin">Over</span>
        </h1>

        <h2>
            Robin caught you.
        </h2>

        <p>
            Final Score:
            <span id="final-score">
                0
            </span>
        </p>

        <button id="restart-btn">
            Play Again
        </button>
    </div>

    <!-- LEVEL -->
    <div id="level-transition"
         class="ui-layer hidden">

        <h1>
            Level
            <span id="transition-level">
                2
            </span>
        </h1>

        <p>
            Robin is adapting...
        </p>
    </div>

    <canvas id="gameCanvas"
            width="840"
            height="600"></canvas>

</div>

<script>
// ========================================
// Assets
// ========================================
const assets = {
    robin:new Image(),
    leif:new Image(),
    lennard:new Image(),
    erim:new Image()
};

assets.robin.src="robin.jpeg";
assets.leif.src="leif.jpeg";
assets.lennard.src="lennard.jpeg";
assets.erim.src="erim.jpeg";

// ========================================
// Canvas
// ========================================
const canvas =
    document.getElementById("gameCanvas");

const ctx =
    canvas.getContext("2d");

const TILE=40;
const COLS=21;
const ROWS=15;

// ========================================
// UI
// ========================================
const uiMainMenu =
    document.getElementById("main-menu");

const uiGameOver =
    document.getElementById("game-over-menu");

const uiTransition =
    document.getElementById("level-transition");

const uiHud =
    document.getElementById("hud");

const uiScore =
    document.getElementById("ui-score");

const uiLevel =
    document.getElementById("ui-level");

const uiAngerBar =
    document.getElementById("anger-bar");

const uiFinalScore =
    document.getElementById("final-score");

// ========================================
// Game State
// ========================================
let gameState="MENU";

let selectedCharacter="leif";

let currentMap=[];

let level=1;
let score=0;
let survivalTime=0;

let exitTile={x:1,y:1};

let lastTime=0;

// ========================================
// Player
// ========================================
const player={
    x:0,
    y:0,
    width:30,
    height:30,

    speed:220,

    hidden:false,
    hideTimer:0
};

// ========================================
// Robin
// ========================================
const robin={
    x:0,
    y:0,
    width:30,
    height:30,

    speed:130,

    anger:0,

    path:[],
    pathIndex:0,

    repath:0,

    wandering:false,
    wanderDir:{x:0,y:0},
    wanderTimer:0
};

// ========================================
// Input
// ========================================
const keys={
    w:false,a:false,s:false,d:false,
    ArrowUp:false,
    ArrowLeft:false,
    ArrowDown:false,
    ArrowRight:false,
    Shift:false
};

window.addEventListener("keydown",e=>{
    if(keys.hasOwnProperty(e.key)){
        keys[e.key]=true;
    }
});

window.addEventListener("keyup",e=>{
    if(keys.hasOwnProperty(e.key)){
        keys[e.key]=false;
    }
});

// ========================================
// Character Select
// ========================================
document.querySelectorAll(".char-card")
.forEach(card=>{

    card.addEventListener("click",()=>{

        document.querySelectorAll(".char-card")
        .forEach(c=>c.classList.remove("selected"));

        card.classList.add("selected");

        selectedCharacter=
            card.dataset.char;
    });
});

// ========================================
// Buttons
// ========================================
document.getElementById("start-btn")
.addEventListener("click",startGame);

document.getElementById("restart-btn")
.addEventListener("click",startGame);

// ========================================
// Helpers
// ========================================
function rand(min,max){
    return Math.floor(
        Math.random()*(max-min+1)
    )+min;
}

function inside(x,y){
    return (
        x>=0 &&
        y>=0 &&
        x<COLS &&
        y<ROWS
    );
}

function tileKey(x,y){
    return `${x},${y}`;
}

function entityTile(ent){
    return {
        x:Math.floor(
            (ent.x+ent.width/2)/TILE
        ),
        y:Math.floor(
            (ent.y+ent.height/2)/TILE
        )
    };
}

function tileCenter(tx,ty,ent){
    return {
        x:tx*TILE+(TILE-ent.width)/2,
        y:ty*TILE+(TILE-ent.height)/2
    };
}

function overlap(a,b){
    return (
        a.x < b.x+b.width &&
        a.x+a.width > b.x &&
        a.y < b.y+b.height &&
        a.y+a.height > b.y
    );
}

// ========================================
// Collision
// ========================================
function wallCollision(rect){

    const left=
        Math.floor(rect.x/TILE);

    const right=
        Math.floor(
            (rect.x+rect.width-1)/TILE
        );

    const top=
        Math.floor(rect.y/TILE);

    const bottom=
        Math.floor(
            (rect.y+rect.height-1)/TILE
        );

    for(let y=top;y<=bottom;y++){

        for(let x=left;x<=right;x++){

            if(!inside(x,y)) return true;

            if(currentMap[y][x]===1){
                return true;
            }
        }
    }

    return false;
}

function move(ent,dx,dy){

    ent.x+=dx;

    if(wallCollision(ent)){
        ent.x-=dx;
    }

    ent.y+=dy;

    if(wallCollision(ent)){
        ent.y-=dy;
    }
}

// ========================================
// LEVEL GENERATION
// ========================================
function generateLevel(){

    const map=
        Array.from(
            {length:ROWS},
            ()=>Array(COLS).fill(1)
        );

    // Open many spaces
    for(let y=1;y<ROWS-1;y++){

        for(let x=1;x<COLS-1;x++){

            map[y][x]=
                Math.random()<0.65 ? 0 : 1;
        }
    }

    // Center arena
    for(let y=4;y<11;y++){

        for(let x=5;x<16;x++){

            map[y][x]=0;
        }
    }

    // Borders
    for(let x=0;x<COLS;x++){
        map[0][x]=1;
        map[ROWS-1][x]=1;
    }

    for(let y=0;y<ROWS;y++){
        map[y][0]=1;
        map[y][COLS-1]=1;
    }

    // Ensure connectivity
    const start={x:1,y:1};

    function bfs(){

        const q=[[1,1]];

        const visited=
            new Set(["1,1"]);

        while(q.length){

            const [cx,cy]=q.shift();

            const dirs=[
                [1,0],[-1,0],
                [0,1],[0,-1]
            ];

            for(const d of dirs){

                const nx=cx+d[0];
                const ny=cy+d[1];

                if(!inside(nx,ny)) continue;
                if(map[ny][nx]===1) continue;

                const key=tileKey(nx,ny);

                if(visited.has(key)) continue;

                visited.add(key);

                q.push([nx,ny]);
            }
        }

        return visited;
    }

    let visited=bfs();

    // Connect unreachable zones
    for(let y=1;y<ROWS-1;y++){

        for(let x=1;x<COLS-1;x++){

            if(
                map[y][x]===0 &&
                !visited.has(tileKey(x,y))
            ){
                map[y][x]=0;

                if(x>1) map[y][x-1]=0;
                if(y>1) map[y-1][x]=0;
            }
        }
    }

    visited=bfs();

    // Find far exit
    let farthest={x:18,y:13,d:0};

    visited.forEach(v=>{

        const [x,y]=v
            .split(",")
            .map(Number);

        const d=
            Math.abs(x-1)+
            Math.abs(y-1);

        if(d>farthest.d){

            farthest={x,y,d};
        }
    });

    // Robin spawn
    let rx=18;
    let ry=1;

    for(let i=0;i<200;i++){

        const tx=rand(1,COLS-2);
        const ty=rand(1,ROWS-2);

        if(map[ty][tx]!==0) continue;

        const distStart=
            Math.abs(tx-1)+
            Math.abs(ty-1);

        const distExit=
            Math.abs(tx-farthest.x)+
            Math.abs(ty-farthest.y);

        if(distStart>8 && distExit>6){

            rx=tx;
            ry=ty;
            break;
        }
    }

    map[1][1]=3;
    map[farthest.y][farthest.x]=2;
    map[ry][rx]=4;

    return {
        map,
        start,
        exit:{
            x:farthest.x,
            y:farthest.y
        },
        robin:{
            x:rx,
            y:ry
        }
    };
}

// ========================================
// Pathfinding
// ========================================
function getPath(start,end){

    const q=[start];

    const came={};

    const visited=
        new Set([
            tileKey(start.x,start.y)
        ]);

    while(q.length){

        const cur=q.shift();

        if(
            cur.x===end.x &&
            cur.y===end.y
        ){

            const path=[];

            let k=
                tileKey(end.x,end.y);

            while(k){

                const [x,y]=
                    k.split(",")
                    .map(Number);

                path.push({x,y});

                k=came[k];
            }

            return path.reverse();
        }

        const dirs=[
            [1,0],[-1,0],
            [0,1],[0,-1]
        ];

        for(const d of dirs){

            const nx=cur.x+d[0];
            const ny=cur.y+d[1];

            if(!inside(nx,ny)) continue;
            if(currentMap[ny][nx]===1) continue;

            const key=tileKey(nx,ny);

            if(visited.has(key)) continue;

            visited.add(key);

            came[key]=tileKey(cur.x,cur.y);

            q.push({x:nx,y:ny});
        }
    }

    return [];
}

// ========================================
// Start Game
// ========================================
function startGame(){

    level=1;
    score=0;

    uiMainMenu.classList.add("hidden");
    uiGameOver.classList.add("hidden");

    uiHud.classList.remove("hidden");

    loadLevel();

    gameState="PLAYING";

    lastTime=performance.now();

    requestAnimationFrame(loop);
}

// ========================================
// Load Level
// ========================================
function loadLevel(){

    const generated=
        generateLevel();

    currentMap=generated.map;

    exitTile=generated.exit;

    const pPos=
        tileCenter(
            generated.start.x,
            generated.start.y,
            player
        );

    player.x=pPos.x;
    player.y=pPos.y;

    const rPos=
        tileCenter(
            generated.robin.x,
            generated.robin.y,
            robin
        );

    robin.x=rPos.x;
    robin.y=rPos.y;

    robin.path=[];

    robin.speed=Math.min(
        130+level*2,
        player.speed-45
    );

    survivalTime=0;

    uiLevel.innerText=level;

    uiAngerBar.style.width="0%";
}

// ========================================
// Level Complete
// ========================================
function nextLevel(){

    gameState="TRANSITION";

    level++;

    score+=1000;

    document.getElementById(
        "transition-level"
    ).innerText=level;

    uiTransition.classList.remove("hidden");

    setTimeout(()=>{

        uiTransition.classList.add("hidden");

        loadLevel();

        gameState="PLAYING";

        lastTime=performance.now();

        requestAnimationFrame(loop);

    },1000);
}

// ========================================
// Game Over
// ========================================
function gameOver(){

    gameState="GAMEOVER";

    uiHud.classList.add("hidden");

    uiFinalScore.innerText=
        Math.floor(score);

    uiGameOver.classList.remove("hidden");
}

// ========================================
// Update
// ========================================
function update(dt){

    survivalTime+=dt;

    score+=dt*12;

    uiScore.innerText=
        Math.floor(score);

    // ----------------------------
    // Hide mechanic
    // ----------------------------
    const hiding=keys.Shift;

    let dx=0;
    let dy=0;

    if(!hiding){

        if(keys.w||keys.ArrowUp) dy--;
        if(keys.s||keys.ArrowDown) dy++;
        if(keys.a||keys.ArrowLeft) dx--;
        if(keys.d||keys.ArrowRight) dx++;

        if(dx!==0 || dy!==0){

            const len=Math.hypot(dx,dy);

            dx/=len;
            dy/=len;

            move(
                player,
                dx*player.speed*dt,
                dy*player.speed*dt
            );
        }

        player.hidden=false;
        player.hideTimer=0;

    } else {

        player.hideTimer+=dt;

        if(player.hideTimer>1){

            player.hidden=true;
        }
    }

    // ----------------------------
    // Robin
    // ----------------------------
    robin.anger=
        Math.min(
            1,
            survivalTime/35
        );

    uiAngerBar.style.width=
        `${robin.anger*100}%`;

    const pTile=
        entityTile(player);

    const rTile=
        entityTile(robin);

    if(player.hidden){

        robin.wandering=true;

    } else {

        robin.wandering=false;
    }

    // Wander mode
    if(robin.wandering){

        robin.wanderTimer-=dt;

        if(robin.wanderTimer<=0){

            robin.wanderTimer=
                rand(1,3);

            const dirs=[
                {x:1,y:0},
                {x:-1,y:0},
                {x:0,y:1},
                {x:0,y:-1}
            ];

            robin.wanderDir=
                dirs[rand(0,3)];
        }

        move(
            robin,
            robin.wanderDir.x*
            robin.speed*
            0.45*
            dt,

            robin.wanderDir.y*
            robin.speed*
            0.45*
            dt
        );

    } else {

        robin.repath-=dt;

        if(robin.repath<=0){

            robin.repath=.2;

            robin.path=
                getPath(
                    rTile,
                    pTile
                );

            robin.pathIndex=1;
        }

        const target=
            robin.path[
                robin.pathIndex
            ];

        if(target){

            const tx=
                target.x*TILE+
                (TILE-robin.width)/2;

            const ty=
                target.y*TILE+
                (TILE-robin.height)/2;

            const vx=tx-robin.x;
            const vy=ty-robin.y;

            const dist=
                Math.hypot(vx,vy);

            if(dist<2){

                robin.pathIndex++;

            } else {

                robin.x+=
                    (vx/dist)*
                    robin.speed*
                    dt;

                robin.y+=
                    (vy/dist)*
                    robin.speed*
                    dt;
            }
        }
    }

    // Exit
    const exitRect={
        x:exitTile.x*TILE,
        y:exitTile.y*TILE,
        width:TILE,
        height:TILE
    };

    if(overlap(player,exitRect)){

        nextLevel();
        return;
    }

    // Robin collision
    if(
        overlap(player,robin) &&
        !player.hidden
    ){
        gameOver();
    }
}

// ========================================
// Draw Character
// ========================================
function drawCharacter(
    img,
    x,y,w,h,
    fallback
){

    if(
        img.complete &&
        img.naturalWidth>0
    ){

        ctx.drawImage(
            img,
            x,y,w,h
        );

    } else {

        ctx.fillStyle=fallback;

        ctx.fillRect(x,y,w,h);
    }
}

// ========================================
// Draw
// ========================================
function draw(){

    ctx.fillStyle="#08111f";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // Map
    for(let y=0;y<ROWS;y++){

        for(let x=0;x<COLS;x++){

            if(currentMap[y][x]===1){

                ctx.fillStyle="#1f2a3d";

                ctx.fillRect(
                    x*TILE,
                    y*TILE,
                    TILE,
                    TILE
                );

                ctx.strokeStyle="#334155";

                ctx.strokeRect(
                    x*TILE,
                    y*TILE,
                    TILE,
                    TILE
                );
            }
        }
    }

    // Exit
    const ex=exitTile.x*TILE;
    const ey=exitTile.y*TILE;

    ctx.fillStyle=
        "rgba(16,185,129,.25)";

    ctx.fillRect(
        ex,
        ey,
        TILE,
        TILE
    );

    ctx.strokeStyle="#10b981";
    ctx.lineWidth=3;

    ctx.strokeRect(
        ex+4,
        ey+4,
        TILE-8,
        TILE-8
    );

    // Exit pulse
    const pulse=
        8+
        Math.sin(Date.now()/140)*4;

    ctx.beginPath();

    ctx.fillStyle="#10b981";

    ctx.arc(
        ex+20,
        ey+20,
        pulse,
        0,
        Math.PI*2
    );

    ctx.fill();

    // Player
    ctx.save();

    if(player.hidden){
        ctx.globalAlpha=.35;
    }

    drawCharacter(
        assets[selectedCharacter],
        player.x,
        player.y,
        player.width,
        player.height,
        "#38bdf8"
    );

    ctx.restore();

    // Robin
    ctx.save();

    ctx.shadowBlur=
        10+
        robin.anger*18;

    ctx.shadowColor="red";

    drawCharacter(
        assets.robin,
        robin.x,
        robin.y,
        robin.width,
        robin.height,
        "#ef4444"
    );

    ctx.restore();
}

// ========================================
// Main Loop
// ========================================
function loop(timestamp){

    if(gameState!=="PLAYING"){
        return;
    }

    let dt=
        (timestamp-lastTime)/1000;

    if(dt>0.1) dt=0.1;

    lastTime=timestamp;

    update(dt);

    draw();

    if(gameState==="PLAYING"){

        requestAnimationFrame(loop);
    }
}

// ========================================
// Initial Draw
// ========================================
ctx.fillStyle="#08111f";

ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
);
</script>

</body>
</html>
