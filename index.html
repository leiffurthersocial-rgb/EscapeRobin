<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robin Arena – Tactical Synergy</title>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            background: #0a0a14;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas { display: block; }

        #ui-layer {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }
        .ui-btn {
            background: rgba(10,10,20,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            font-weight: bold;
        }
        .ui-btn:hover { background: rgba(255,255,255,0.15); }
        .ui-btn.active {
            background: rgba(204,0,255,0.4);
            border-color: #cc00ff;
            box-shadow: 0 0 12px #cc00ff;
        }

        #settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,35,0.95);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px 30px;
            z-index: 30;
            display: none;
            flex-direction: column;
            gap: 20px;
            color: #fff;
            min-width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        #settings-panel h3 {
            margin: 0 0 10px;
            font-size: 22px;
            text-align: center;
            color: #cc00ff;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-row label {
            font-size: 16px;
        }
        .setting-row select, .setting-row button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .setting-row button.active {
            background: #cc00ff;
            border-color: #cc00ff;
        }
        #close-settings {
            align-self: center;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="settings-btn" class="ui-btn">⚙️ Settings</button>
    </div>

    <div id="settings-panel">
        <h3>⚙️ Settings</h3>
        <div class="setting-row">
            <label>Infinite Mode</label>
            <button id="set-inf-toggle" class="">OFF</button>
        </div>
        <div class="setting-row">
            <label>Camera Shake</label>
            <button id="set-shake-toggle" class="active">ON</button>
        </div>
        <div class="setting-row">
            <label>Background</label>
            <select id="bg-select">
                <option value="dark">Dark (default)</option>
                <option value="red">Red Void</option>
                <option value="cyber">Cyber Neon</option>
            </select>
        </div>
        <button id="close-settings">Close</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // ---------- SETTINGS STATE ----------
        let infiniteMode = false;
        let cameraShakeOn = true;
        let backgroundStyle = "dark"; // dark, red, cyber
        let pDeaths = 0;
        let rDeaths = 0;
        let shakeIntensity = 0;
        const MAX_SHAKE = 18;

        // Per‑player death counters & victories
        let leifDeaths = 0, lennardDeaths = 0, erimDeaths = 0;
        let robinVictories = 0, playerVictories = 0;

        // Victory state
        let robinVictory = false;
        let victoryTimer = 0;
        const VICTORY_DURATION = 4000;

        // Chat messages (fade out)
        const chatMessages = [];

        // ---------- UI ELEMENTS ----------
        const settingsBtn = document.getElementById("settings-btn");
        const settingsPanel = document.getElementById("settings-panel");
        const closeSettingsBtn = document.getElementById("close-settings");
        const infToggleBtn = document.getElementById("set-inf-toggle");
        const shakeToggleBtn = document.getElementById("set-shake-toggle");
        const bgSelect = document.getElementById("bg-select");

        settingsBtn.addEventListener("click", () => {
            settingsPanel.style.display = "flex";
        });
        closeSettingsBtn.addEventListener("click", () => {
            settingsPanel.style.display = "none";
        });

        infToggleBtn.addEventListener("click", () => {
            infiniteMode = !infiniteMode;
            infToggleBtn.classList.toggle("active", infiniteMode);
            infToggleBtn.innerText = infiniteMode ? "ON" : "OFF";
            if (infiniteMode && !robin.alive) respawnRobin();
        });

        shakeToggleBtn.addEventListener("click", () => {
            cameraShakeOn = !cameraShakeOn;
            shakeToggleBtn.classList.toggle("active", cameraShakeOn);
            shakeToggleBtn.innerText = cameraShakeOn ? "ON" : "OFF";
        });

        bgSelect.addEventListener("change", () => {
            backgroundStyle = bgSelect.value;
        });

        // ---------- HELPER FUNCTIONS ----------
        function resize() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
        }
        addEventListener("resize", resize);
        resize();

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
        function norm(x, y) {
            const l = Math.hypot(x, y) || 1;
            return { x: x / l, y: y / l };
        }

        function load(src) {
            const i = new Image();
            i.src = src;
            return i;
        }

        const imgs = {
            robin: load("robin.jpeg"),
            leif: load("leif.jpeg"),
            lennard: load("lennard.jpeg"),
            erim: load("erim.jpeg")
        };

        // ---------- GAME OBJECTS ----------
        const particles = [];
        const projectiles = [];
        const powerups = [];
        const texts = [];

        // ---------- ENTITIES ----------
        const robin = {
            x: canvas.width / 2, y: canvas.height / 2,
            vx: 0, vy: 0,
            size: 88,
            hp: 280, maxHp: 280, ghostHp: 280,
            alive: true,
            immunity: 0,
            facing: 0,
            slashCd: 0, orbCd: 0, dashCd: 0, slamCd: 0,
            shield: 0,
            speedBuff: 1, damageBuff: 1,
            slamTelegraph: null
        };

        const runners = [
            {
                name: "leif", role: "midrange", // new damage dealer
                x: 300, y: 300, vx: 0, vy: 0,
                hp: 88, maxHp: 88, ghostHp: 88,
                size: 44, alive: true, immunity: 2000,
                kunaiCd: 0, zapCd: 0, evadeCd: 0,
                damageBuff: 1, speedBuff: 1, dance: 0
            },
            {
                name: "lennard", role: "sniper",
                x: 900, y: 500, vx: 0, vy: 0,
                hp: 70, maxHp: 70, ghostHp: 70, // lowered HP
                size: 42, alive: true, immunity: 2000,
                snipeCd: 0, panicShotCd: 0, dodgeCd: 0, vanishCd: 0, blinkCd: 0,
                damageBuff: 1, speedBuff: 1, dance: 0,
                invisible: false, invisTimer: 0
            },
            {
                name: "erim", role: "healer", // new tank/healer
                x: 700, y: 700, vx: 0, vy: 0,
                hp: 120, maxHp: 120, ghostHp: 120,
                size: 46, alive: true, immunity: 2000,
                bashCd: 0, healAuraCd: 0, shieldAllyCd: 0,
                healAuraActive: false, healAuraTimer: 0,
                damageBuff: 1, speedBuff: 1, dance: 0
            }
        ];

        // ---------- POWERUPS (mainly heal, rarely speed) ----------
        function spawnPowerup() {
            // 80 % heal, 20 % speed
            const type = Math.random() < 0.8 ? "heal" : "speed";
            let px, py;
            do {
                px = rand(80, canvas.width - 80);
                py = rand(80, canvas.height - 80);
            } while (px < 80 || px > canvas.width - 80 || py < 80 || py > canvas.height - 80);
            powerups.push({
                x: px, y: py,
                type: type,
                pulse: rand(0, 999)
            });
        }
        for (let i = 0; i < 6; i++) spawnPowerup();

        // ---------- COMBAT & EFFECTS ----------
        function burst(x, y, color, count = 18) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: rand(-5, 5),
                    vy: rand(-5, 5),
                    life: rand(20, 45),
                    color,
                    size: rand(2, 5)
                });
            }
        }

        function textPop(x, y, text, color) {
            texts.push({ x, y, text, color, vy: -1, life: 60 });
        }

        function addChat(text) {
            chatMessages.push({ text, life: 5000 });
            while (chatMessages.length > 5) chatMessages.shift();
        }

        function addShake(amount) {
            if (!cameraShakeOn) return;
            shakeIntensity = Math.min(shakeIntensity + amount, MAX_SHAKE);
        }

        function getNearestPowerup(entity, type = null, maxDist = Infinity) {
            let best = null, minDist = maxDist;
            for (const p of powerups) {
                if (type && p.type !== type) continue;
                const d = dist(entity, p);
                if (d < minDist) { minDist = d; best = p; }
            }
            return best;
        }

        function respawnRobin() {
            robin.alive = true;
            robin.maxHp = 280;
            robin.hp = robin.maxHp;
            robin.ghostHp = robin.maxHp;
            robin.immunity = 1500;
            robin.x = canvas.width / 2;
            robin.y = canvas.height / 2;
            robin.slashCd = robin.orbCd = robin.dashCd = robin.slamCd = 0;
            robin.slamTelegraph = null;
            burst(robin.x, robin.y, "#cc00ff", 80);
            textPop(robin.x, robin.y - 40, "RESPAWNED!", "#cc00ff");
            addChat("Robin RESPAWNED!");
            addShake(10);
        }

        function damage(target, amount, sourceX, sourceY) {
            if (!target.alive) return;
            if (target.immunity > 0) return;
            if (target.invisible && target.role === "sniper") return; // Robin ignores invisible Lennard
            if (target.shield > 0) {
                const absorbed = Math.min(target.shield, amount);
                target.shield -= absorbed;
                amount -= absorbed;
            }
            if (amount <= 0) return;
            target.hp -= amount;
            textPop(target.x, target.y - 20, "-" + Math.round(amount), "#ff7777");
            burst(target.x, target.y, "#ff5555", 10);
            const dx = target.x - sourceX, dy = target.y - sourceY;
            const n = norm(dx, dy);
            target.vx += n.x * amount * 0.03;
            target.vy += n.y * amount * 0.03;

            if (target.hp <= 0) {
                target.hp = 0;
                if (target === robin) {
                    if (infiniteMode) {
                        rDeaths++;
                        playerVictories++;
                        respawnRobin();
                    } else {
                        robin.alive = false;
                        burst(robin.x, robin.y, "white", 120);
                        for (const r of runners) if (r.alive) r.dance = rand(0, 100);
                        addShake(15);
                        addChat("Robin DEFEATED!");
                        playerVictories++;
                    }
                } else {
                    target.alive = false;
                    target.respawn = rand(8000, 13000);
                    pDeaths++;
                    if (target.name === "leif") leifDeaths++;
                    if (target.name === "lennard") lennardDeaths++;
                    if (target.name === "erim") erimDeaths++;
                    burst(target.x, target.y, "#ff2222", 45);
                    addChat(`${target.name.toUpperCase()} down!`);
                }
            }
        }

        function heal(entity, amount) {
            entity.hp = Math.min(entity.maxHp, entity.hp + amount);
        }

        function shoot(owner, x, y, angle, speed, damageAmount, color, size = 5, type = "bullet", extra = {}) {
            projectiles.push({
                owner, x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                damage: damageAmount, color, size, type, life: 220,
                ...extra
            });
        }

        // ---------- ROBIN AI (smarter healing awareness) ----------
        function updateRobin(dt) {
            if (!robin.alive) return;
            robin.immunity -= dt;
            robin.slashCd -= dt;
            robin.orbCd -= dt;
            robin.dashCd -= dt;
            robin.slamCd -= dt;

            // Slam telegraph
            if (robin.slamTelegraph) {
                robin.slamTelegraph.remaining -= dt;
                if (robin.slamTelegraph.remaining <= 0) {
                    const cx = robin.slamTelegraph.x, cy = robin.slamTelegraph.y;
                    for (const r of runners) {
                        if (!r.alive || r.invisible) continue;
                        if (dist({ x: cx, y: cy }, r) < 160) damage(r, 28, cx, cy);
                    }
                    burst(cx, cy, "#ff4444", 50);
                    addChat("Robin used SLAM!");
                    addShake(14);
                    robin.slamTelegraph = null;
                }
            }

            // Find nearest visible runner
            let target = null, bestDist = Infinity;
            for (const r of runners) {
                if (!r.alive || r.invisible) continue;
                const d = dist(robin, r);
                if (d < bestDist) { bestDist = d; target = r; }
            }
            if (!target) return;

            const dx = target.x - robin.x, dy = target.y - robin.y;
            const d = Math.hypot(dx, dy);
            const n = norm(dx, dy);
            robin.facing = Math.atan2(dy, dx);

            let moveX = n.x, moveY = n.y;

            // Strongly seek healing orbs when low
            if (robin.hp < robin.maxHp * 0.5) {
                const healP = getNearestPowerup(robin, "heal", 350);
                if (healP) {
                    const pn = norm(healP.x - robin.x, healP.y - robin.y);
                    moveX += pn.x * 2.0;  // stronger weight
                    moveY += pn.y * 2.0;
                }
            }

            // Avoid being surrounded
            const closeRunners = runners.filter(r => r.alive && !r.invisible && dist(robin, r) < 200);
            if (closeRunners.length >= 2) {
                let cx = 0, cy = 0;
                for (const r of closeRunners) { cx += r.x; cy += r.y; }
                cx /= closeRunners.length; cy /= closeRunners.length;
                const away = norm(robin.x - cx, robin.y - cy);
                moveX += away.x * 0.7;
                moveY += away.y * 0.7;
            }

            const moveN = norm(moveX, moveY);
            robin.vx += moveN.x * 0.16;
            robin.vy += moveN.y * 0.16;
            robin.vx *= 0.93;
            robin.vy *= 0.93;
            robin.x += robin.vx * 1.9;
            robin.y += robin.vy * 1.9;
            robin.x = clamp(robin.x, 100, canvas.width - 100);
            robin.y = clamp(robin.y, 100, canvas.height - 100);

            // Abilities
            if (d < 100 && robin.slashCd <= 0) {
                robin.slashCd = 650;
                damage(target, 18, robin.x, robin.y);
                addChat("Robin SLASH");
            }

            if (d > 140 && robin.orbCd <= 0) {
                robin.orbCd = 2300;
                for (let i = -1; i <= 1; i++) {
                    shoot(robin, robin.x, robin.y, robin.facing + i * 0.15, 6.5, 14, "#ff6666", 7, "orb");
                }
                addChat("Robin ORBS");
            }

            if (d > 150 && d < 320 && robin.dashCd <= 0) {
                robin.dashCd = 3800;
                robin.vx += n.x * 10;
                robin.vy += n.y * 10;
                damage(target, 22, robin.x, robin.y);
                addChat("Robin DASH");
                addShake(6);
            }

            if (d < 160 && robin.slamCd <= 0 && !robin.slamTelegraph) {
                robin.slamCd = 8500;
                robin.slamTelegraph = { remaining: 950, total: 950, x: robin.x, y: robin.y };
                addChat("Robin winding up SLAM...");
            }
        }

        // ---------- RUNNER AI (roles rebalanced) ----------
        function updateRunner(r, dt) {
            if (!r.alive) {
                r.respawn -= dt;
                if (r.respawn <= 0 && robin.alive) {
                    r.alive = true;
                    r.hp = r.maxHp;
                    r.ghostHp = r.maxHp;
                    r.immunity = 2000;
                    r.x = rand(150, canvas.width - 150);
                    r.y = rand(150, canvas.height - 150);
                    burst(r.x, r.y, "#66ffcc", 35);
                    addChat(`${r.name} respawned.`);
                }
                return;
            }

            r.immunity -= dt;
            if (r.invisible) {
                r.invisTimer -= dt;
                if (r.invisTimer <= 0) r.invisible = false;
            }

            const dx = robin.x - r.x, dy = robin.y - r.y;
            const d = Math.hypot(dx, dy);
            const n = norm(dx, dy);

            const healer = runners.find(b => b.role === "healer");
            const selfLow = r.hp < r.maxHp * 0.45;
            let moveX = 0, moveY = 0;

            // ---------- LEIF (mid‑range damage dealer) ----------
            if (r.role === "midrange") {
                r.kunaiCd -= dt;
                r.zapCd -= dt;
                r.evadeCd -= dt;

                // Stay at medium range
                if (d > 210) { moveX += n.x * 0.7; moveY += n.y * 0.7; }
                else if (d < 140) { moveX -= n.x * 0.9; moveY -= n.y * 0.9; }
                moveX += -n.y * 0.25; moveY += n.x * 0.25; // strafe

                // Kunai volley (3 fast projectiles)
                if (d > 130 && r.kunaiCd <= 0) {
                    r.kunaiCd = 950;
                    const baseAngle = Math.atan2(dy, dx);
                    for (let i = -1; i <= 1; i++) {
                        shoot(r, r.x, r.y, baseAngle + i * 0.2, 9, 9, "#ffaa66", 4, "kunai");
                    }
                    addChat("Leif KUNAI VOLLEY");
                }

                // Zap (quick single shot)
                if (d < 260 && r.zapCd <= 0) {
                    r.zapCd = 480;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx) + rand(-0.08, 0.08), 8.5, 11, "#ffd166", 4);
                }

                // Evade (short dash backwards)
                if (d < 150 && r.evadeCd <= 0) {
                    r.evadeCd = 2200;
                    r.vx -= n.x * 9;
                    r.vy -= n.y * 9;
                    burst(r.x, r.y, "#ffaa66", 10);
                }
            }
            // ---------- LENNARD (nerfed sniper) ----------
            else if (r.role === "sniper") {
                r.snipeCd -= dt;
                r.panicShotCd -= dt;
                r.dodgeCd -= dt;
                r.vanishCd -= dt;
                r.blinkCd -= dt;

                if (d < 150 && r.vanishCd <= 0 && !r.invisible) {
                    r.invisible = true;
                    r.invisTimer = 2000; // shorter
                    r.vanishCd = 22000;  // longer cooldown
                    addChat("Lennard VANISHED");
                    textPop(r.x, r.y - 30, "VANISH!", "#aaaaff");
                }
                if (d < 130 && r.blinkCd <= 0 && !r.invisible) {
                    r.blinkCd = 14000;
                    const angle = Math.atan2(r.y - robin.y, r.x - robin.x) + rand(-0.5, 0.5);
                    r.x += Math.cos(angle) * 200;
                    r.y += Math.sin(angle) * 200;
                    r.x = clamp(r.x, 80, canvas.width - 80);
                    r.y = clamp(r.y, 80, canvas.height - 80);
                    burst(r.x, r.y, "#aaaaff", 20);
                    addChat("Lennard BLINKED");
                }

                if ((selfLow || (r.hp < r.maxHp * 0.5)) && !r.invisible) {
                    moveX -= n.x * 1.9;
                    moveY -= n.y * 1.9;
                } else if (d < 320 && !r.invisible) {
                    moveX -= n.x * 1.3;
                    moveY -= n.y * 1.3;
                }
                moveX += -n.y * 0.15; moveY += n.x * 0.15;

                if (d > 190 && r.snipeCd <= 0) {
                    r.snipeCd = 600;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx), 10.5, 7, "#66ccff", 4); // less damage
                }
                if (d < 130 && r.panicShotCd <= 0) {
                    r.panicShotCd = 4000;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx), 15, 32, "#ffee55", 9, "rail");
                    r.vx -= n.x * 10; r.vy -= n.y * 10;
                    burst(r.x, r.y, "#ffee55", 25);
                    addChat("Lennard PANIC SHOT");
                }
                if (d < 100 && r.dodgeCd <= 0 && !r.invisible) {
                    r.dodgeCd = 2200;
                    r.vx -= n.x * 13; r.vy -= n.y * 13;
                }
            }
            // ---------- ERIM (healer tank) ----------
            else if (r.role === "healer") {
                r.bashCd -= dt;
                r.healAuraCd -= dt;
                r.shieldAllyCd -= dt;

                // Healing aura activation
                if (r.healAuraActive) {
                    r.healAuraTimer -= dt;
                    // Heal self and nearby allies every tick
                    if (Math.floor(performance.now() / 250) % 2 === 0) { // approx 4 times per second
                        for (const ally of runners) {
                            if (!ally.alive || ally.invisible) continue;
                            if (dist(r, ally) < 140) heal(ally, 3);
                        }
                        heal(r, 3);
                    }
                    if (r.healAuraTimer <= 0) {
                        r.healAuraActive = false;
                        r.healAuraCd = 11000;
                        burst(r.x, r.y, "#88ff88", 30);
                        addChat("Erim healing aura ended");
                    }
                } else {
                    // Activate aura if many allies need healing
                    const lowAllies = runners.filter(a => a.alive && a !== r && a.hp < a.maxHp * 0.5);
                    if ((lowAllies.length >= 2 || selfLow) && r.healAuraCd <= 0) {
                        r.healAuraActive = true;
                        r.healAuraTimer = 4000;
                        r.healAuraCd = 11000;
                        burst(r.x, r.y, "#88ff88", 50);
                        addChat("Erim HEALING AURA");
                    }
                }

                // Shield ally (lowest HP)
                if (r.shieldAllyCd <= 0) {
                    let target = null, lowestHp = Infinity;
                    for (const ally of runners) {
                        if (!ally.alive || ally === r) continue;
                        if (ally.hp < lowestHp && ally.shield < 20) {
                            lowestHp = ally.hp;
                            target = ally;
                        }
                    }
                    if (target && (target.hp < target.maxHp * 0.7 || target.shield < 20)) {
                        r.shieldAllyCd = 12000;
                        target.shield = Math.min(40, target.shield + 30);
                        textPop(target.x, target.y - 30, "PROTECTED", "#bb66ff");
                        addChat(`Erim shielded ${target.name}`);
                    }
                }

                // Movement: stay between Robin and allies, try to body-block
                if (selfLow) {
                    // retreat toward healer? actually we are healer, retreat toward nearest ally
                    const nearestAlly = runners.filter(a => a.alive && a !== r).sort((a,b)=>dist(r,a)-dist(r,b))[0];
                    if (nearestAlly) {
                        const an = norm(nearestAlly.x - r.x, nearestAlly.y - r.y);
                        moveX += an.x * 1.2;
                        moveY += an.y * 1.2;
                    } else {
                        moveX -= n.x * 1.0;
                        moveY -= n.y * 1.0;
                    }
                } else {
                    if (d > 110) { moveX += n.x * 0.6; moveY += n.y * 0.6; }
                    moveX += -n.y * 0.25; moveY += n.x * 0.25;
                }

                // Bash (melee)
                if (d < 90 && r.bashCd <= 0) {
                    r.bashCd = 850;
                    damage(robin, 9, r.x, r.y);
                }
            }

            // Boundaries (larger margin)
            const margin = 250;
            if (r.x < margin) moveX += 1.2;
            if (r.x > canvas.width - margin) moveX -= 1.2;
            if (r.y < margin) moveY += 1.2;
            if (r.y > canvas.height - margin) moveY -= 1.2;

            // Powerup seeking (only heal is useful for runners now, rarely speed)
            if (r.hp < r.maxHp * 0.6) {
                const healP = getNearestPowerup(r, "heal", 300);
                if (healP) {
                    const pn = norm(healP.x - r.x, healP.y - r.y);
                    moveX += pn.x * 1.5;
                    moveY += pn.y * 1.5;
                }
            }

            r.vx += moveX * 0.13;
            r.vy += moveY * 0.13;
            r.vx *= 0.93;
            r.vy *= 0.93;
            r.x += r.vx * 2.3 * r.speedBuff;
            r.y += r.vy * 2.3 * r.speedBuff;
            r.x = clamp(r.x, 40, canvas.width - 40);
            r.y = clamp(r.y, 40, canvas.height - 40);

            if (!robin.alive && !robinVictory) {
                r.dance += dt * 0.01;
                r.x += Math.sin(r.dance) * 2;
                r.y += Math.cos(r.dance * 2) * 2;
            }
        }

        // ---------- PROJECTILES ----------
        function updateProjectiles(dt) {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;

                if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) {
                    projectiles.splice(i, 1);
                    continue;
                }

                if (p.owner !== robin && robin.alive && dist(p, robin) < robin.size * 0.45) {
                    damage(robin, p.damage, p.x, p.y);
                    projectiles.splice(i, 1);
                    continue;
                }

                if (p.owner === robin) {
                    for (const r of runners) {
                        if (!r.alive || r.invisible) continue;
                        if (dist(p, r) < r.size * 0.45) {
                            damage(r, p.damage, p.x, p.y);
                            projectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                if (p.life <= 0) projectiles.splice(i, 1);
            }
        }

        // ---------- POWERUPS ----------
        function updatePowerups(dt) {
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.pulse += dt * 0.004;
                if (robin.alive && dist(robin, p) < 50) {
                    applyPowerup(robin, p.type);
                    powerups.splice(i, 1); spawnPowerup();
                    continue;
                }
                let collected = false;
                for (const r of runners) {
                    if (!r.alive) continue;
                    if (dist(r, p) < 35) {
                        applyPowerup(r, p.type);
                        powerups.splice(i, 1); spawnPowerup();
                        collected = true;
                        break;
                    }
                }
                if (collected) continue;
            }
        }

        function applyPowerup(entity, type) {
            if (type === "heal") {
                heal(entity, entity.maxHp * 0.3);
                textPop(entity.x, entity.y, "+HP", "#66ff99");
            } else if (type === "speed") {
                entity.speedBuff = 1.4;
                setTimeout(() => { entity.speedBuff = 1; }, 7000);
                textPop(entity.x, entity.y, "SPD", "#66ccff");
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.97; p.vy *= 0.97;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                t.y += t.vy;
                t.life--;
                if (t.life <= 0) texts.splice(i, 1);
            }
            for (let i = chatMessages.length - 1; i >= 0; i--) {
                chatMessages[i].life -= dt;
                if (chatMessages[i].life <= 0) chatMessages.splice(i, 1);
            }
        }

        // ---------- VICTORY CONDITION ----------
        function checkVictory() {
            if (robinVictory) return;
            if (!robin.alive) return;
            if (runners.every(r => !r.alive)) {
                robinVictory = true;
                victoryTimer = VICTORY_DURATION;
                robinVictories++;
                addShake(22);
                addChat("Robin WINS!");
                burst(robin.x, robin.y, "#cc00ff", 150);
                textPop(robin.x, robin.y - 50, "ROBIN WINS!", "#cc00ff");
                robin.immunity = VICTORY_DURATION;
            }
        }

        function restartGame() {
            robinVictory = false;
            victoryTimer = 0;
            for (const r of runners) {
                if (!r.alive) {
                    r.alive = true;
                    r.hp = r.maxHp;
                    r.ghostHp = r.maxHp;
                    r.immunity = 2000;
                    r.x = rand(150, canvas.width - 150);
                    r.y = rand(150, canvas.height - 150);
                }
            }
            if (robin.alive) {
                robin.hp = robin.maxHp;
                robin.ghostHp = robin.maxHp;
            }
            burst(robin.x, robin.y, "#ffffff", 60);
        }

        // ---------- RENDERING ----------
        function drawBackground() {
            let grad;
            if (backgroundStyle === "red") {
                grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                grad.addColorStop(0, "#3d1a1a");
                grad.addColorStop(0.7, "#180a0a");
                grad.addColorStop(1, "#020000");
            } else if (backgroundStyle === "cyber") {
                grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                grad.addColorStop(0, "#1a1a4d");
                grad.addColorStop(0.6, "#0f0f2a");
                grad.addColorStop(1, "#000011");
            } else {
                grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                grad.addColorStop(0, "#24243d");
                grad.addColorStop(0.6, "#101018");
                grad.addColorStop(1, "#040406");
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawArena() {
            const t = performance.now() * 0.015;
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for (let x = -50; x < canvas.width + 50; x += 50) {
                ctx.beginPath(); ctx.moveTo(x + (t % 50), 0); ctx.lineTo(x + (t % 50), canvas.height); ctx.stroke();
            }
            for (let y = -50; y < canvas.height + 50; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y + (t % 50)); ctx.lineTo(canvas.width, y + (t % 50)); ctx.stroke();
            }
        }

        function drawImage(img, x, y, size, glow, alpha = 1, rot = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.globalAlpha = alpha;
            ctx.shadowColor = glow;
            ctx.shadowBlur = 25;
            ctx.drawImage(img, -size / 2, -size / 2, size, size);
            ctx.restore();
        }

        function drawHealth(entity, color, dt) {
            if (entity.ghostHp === undefined) entity.ghostHp = entity.hp;
            if (entity.ghostHp > entity.hp) entity.ghostHp -= (entity.maxHp * 0.001 * dt);
            if (entity.ghostHp < entity.hp) entity.ghostHp = entity.hp;
            ctx.fillStyle = "#000";
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50, 6);
            ctx.fillStyle = "#fff";
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50 * (entity.ghostHp / entity.maxHp), 6);
            ctx.fillStyle = color;
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50 * (entity.hp / entity.maxHp), 6);
        }

        function drawStats() {
            if (!infiniteMode) return;
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(canvas.width/2 - 180, 10, 360, 80);
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.strokeRect(canvas.width/2 - 180, 10, 360, 80);
            ctx.fillStyle = "white";
            ctx.font = "bold 14px monospace";
            ctx.textAlign = "center";
            ctx.fillText(`Robin Deaths: ${rDeaths}   Player Victories: ${playerVictories}`, canvas.width/2, 32);
            ctx.fillText(`Leif: ${leifDeaths}   Lennard: ${lennardDeaths}   Erim: ${erimDeaths}`, canvas.width/2, 56);
            ctx.fillText(`Robin Victories: ${robinVictories}`, canvas.width/2, 76);
            ctx.textAlign = "left";
        }

        function drawChat() {
            const startY = 30;
            for (let i = 0; i < chatMessages.length; i++) {
                const msg = chatMessages[i];
                const alpha = Math.min(1, msg.life / 1500);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = "white";
                ctx.font = "bold 13px monospace";
                ctx.fillText(msg.text, 25, startY + i * 24);
            }
            ctx.globalAlpha = 1;
        }

        function render(dt) {
            drawBackground();
            let shakeX = 0, shakeY = 0;
            if (cameraShakeOn && shakeIntensity > 0.1) {
                shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeIntensity *= 0.88;
            }
            ctx.save();
            ctx.translate(shakeX, shakeY);

            drawArena();

            // Powerups
            for (const p of powerups) {
                let color = "#66ff99"; // heal
                if (p.type === "speed") color = "#66ccff";
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 20;
                ctx.arc(p.x, p.y, 12 + Math.sin(p.pulse) * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 45;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Projectiles
            for (const p of projectiles) {
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 16;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Slam telegraph
            if (robin.slamTelegraph) {
                const progress = 1 - robin.slamTelegraph.remaining / robin.slamTelegraph.total;
                const radius = 160 * progress;
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,50,50,0.7)";
                ctx.lineWidth = 3;
                ctx.arc(robin.slamTelegraph.x, robin.slamTelegraph.y, radius, 0, Math.PI*2);
                ctx.stroke();
                ctx.lineWidth = 1;
            }

            // Robin
            if (robin.alive) {
                const glow = "#ff4444";
                const immunityFlash = (robin.immunity > 0 && Math.sin(performance.now()*0.02) > 0) ? 0.4 : 1;
                drawImage(imgs.robin, robin.x, robin.y, robin.size, glow, immunityFlash, robin.facing*0.08);
                drawHealth(robin, glow, dt);
            } else {
                drawImage(imgs.robin, robin.x, robin.y, robin.size, "#ffffff", 0.3, performance.now()*0.001);
                if (!infiniteMode && !robinVictory) {
                    ctx.fillStyle = "white";
                    ctx.font = "bold 40px Arial";
                    ctx.fillText("ROBIN DEFEATED", canvas.width/2-170, 80);
                }
            }

            // Runners
            for (const r of runners) {
                if (!r.alive || r.invisible) continue;
                let glow = "#66aaff";
                if (r.role === "healer") glow = "#88ff88";
                if (r.role === "sniper") glow = "#66ccff";
                if (r.role === "midrange") glow = "#ffaa66";
                drawImage(imgs[r.name], r.x, r.y, r.size, glow,
                    r.immunity > 0 ? 0.5 + Math.sin(performance.now()*0.02)*0.3 : 1,
                    Math.sin(performance.now()*0.002 + r.x)*0.05);
                drawHealth(r, glow, dt);
                if (r.role === "healer" && r.healAuraActive) {
                    ctx.strokeStyle = "rgba(136,255,136,0.5)";
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 140, 0, Math.PI*2);
                    ctx.stroke();
                }
                if (!robin.alive && !robinVictory && !infiniteMode) {
                    ctx.strokeStyle = `hsla(${(performance.now()*0.08+r.x)%360},100%,70%,0.7)`;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 32+Math.sin(r.dance*4)*8, 0, Math.PI*2);
                    ctx.stroke();
                }
            }

            // Texts
            for (const t of texts) {
                ctx.globalAlpha = t.life / 60;
                ctx.fillStyle = t.color;
                ctx.font = "bold 16px Arial";
                ctx.fillText(t.text, t.x, t.y);
            }
            ctx.globalAlpha = 1;
            ctx.restore();

            drawChat();
            drawStats();

            if (robinVictory) {
                ctx.fillStyle = `rgba(0,0,0,${0.3+Math.sin(performance.now()*0.01)*0.1})`;
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#cc00ff";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("ROBIN WINS!", canvas.width/2, canvas.height/2);
                ctx.textAlign = "left";
            }
        }

        // ---------- GAME LOOP ----------
        let last = performance.now();
        function loop(now) {
            const dt = Math.min(now - last, 35);
            last = now;

            if (robinVictory) {
                victoryTimer -= dt;
                if (victoryTimer <= 0) restartGame();
                updateParticles(dt);
                for (const r of runners) if (r.alive) r.dance += dt*0.01;
                render(dt);
                requestAnimationFrame(loop);
                return;
            }

            updateRobin(dt);
            for (const r of runners) updateRunner(r, dt);
            updateProjectiles(dt);
            updatePowerups(dt);
            updateParticles(dt);
            checkVictory();

            render(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
