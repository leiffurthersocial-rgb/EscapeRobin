<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin Arena: Ultimate Showdown</title>
    <style>
        html, body { 
            margin: 0; overflow: hidden; background: #05050a; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .btn {
            background: rgba(15, 15, 25, 0.8); color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            backdrop-filter: blur(8px); transition: all 0.2s;
            font-size: 12px; font-weight: bold; letter-spacing: 1px;
            text-transform: uppercase; text-align: center;
        }
        .btn:hover { background: rgba(40, 40, 60, 0.9); border-color: #00f2ff; }
        .btn.active { color: #00f2ff; border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        #combat-log {
            position: absolute; bottom: 30px; left: 30px; width: 300px;
            pointer-events: none; display: flex; flex-direction: column; gap: 6px;
        }
        .log-msg {
            background: rgba(0, 0, 0, 0.6); color: #fff; padding: 6px 12px;
            border-radius: 4px; font-size: 13px; animation: slideInFade 4s forwards;
            border-left: 4px solid #444; backdrop-filter: blur(4px);
        }
        @keyframes slideInFade {
            0% { opacity: 0; transform: translateX(-20px); }
            5% { opacity: 1; transform: translateX(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <button id="inf-toggle" class="btn">Infinite Mode: OFF</button>
    <button id="shake-toggle" class="btn active">Camera Shake: ON</button>
</div>

<div id="combat-log"></div>

<canvas id="game"></canvas>

<script>
/** * ROBIN ARENA - ULTIMATE EDITION
 * Logic: Healer/Tank/DPS Synergy vs Telegraphing Boss
 */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- Configuration & State ---
let infiniteMode = false;
let cameraShakeEnabled = true;
let shakeTime = 0;
let shakePower = 0;
let gameStatus = "playing"; // playing, robin_win, players_win
let statusTimer = 0;

function addLog(text, color = "#555") {
    const log = document.getElementById('combat-log');
    const msg = document.createElement('div');
    msg.className = 'log-msg';
    msg.style.borderLeftColor = color;
    msg.innerText = text;
    log.appendChild(msg);
    if(log.childNodes.length > 5) log.removeChild(log.firstChild);
}

// UI Listeners
document.getElementById('inf-toggle').onclick = (e) => {
    infiniteMode = !infiniteMode;
    e.target.classList.toggle('active', infiniteMode);
    e.target.innerText = `Infinite Mode: ${infiniteMode ? 'ON' : 'OFF'}`;
};
document.getElementById('shake-toggle').onclick = (e) => {
    cameraShakeEnabled = !cameraShakeEnabled;
    e.target.classList.toggle('active', cameraShakeEnabled);
    e.target.innerText = `Camera Shake: ${cameraShakeEnabled ? 'ON' : 'OFF'}`;
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Math Helpers ---
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const norm = (x, y) => {
    const l = Math.hypot(x, y) || 1;
    return { x: x / l, y: y / l };
};

// --- Entities ---
const robin = {
    x: canvas.width / 2, y: canvas.height / 2,
    vx: 0, vy: 0, size: 90,
    hp: 500, maxHp: 500, ghostHp: 500,
    phase: 1, alive: true,
    facing: 0, dazed: 0,
    slashCd: 0, orbCd: 0, slamCd: 0, dashCd: 0,
    telegraph: { type: null, timer: 0, x: 0, y: 0 }
};

const runners = [
    { name: "Erim", role: "berserker", hp: 150, maxHp: 150, size: 50, x: 200, y: 200, alive: true, respawn: 0, slashCd: 0, healCd: 0 },
    { name: "Lennard", role: "sniper", hp: 85, maxHp: 85, size: 42, x: 800, y: 200, alive: true, respawn: 0, snipeCd: 0, dodgeCd: 0 },
    { name: "Leif", role: "trickster", hp: 110, maxHp: 110, size: 45, x: 500, y: 600, alive: true, respawn: 0, bombCd: 0, zapCd: 0 }
];

runners.forEach(r => { r.vx = 0; r.vy = 0; r.ghostHp = r.hp; });

const particles = [];

function triggerShake(power, duration) {
    if(!cameraShakeEnabled) return;
    shakePower = power;
    shakeTime = duration;
}

function damage(target, amount, color = "#ff4444") {
    if(!target.alive || gameStatus !== "playing") return;
    target.hp -= amount;
    
    // Blood particles
    for(let i=0; i<5; i++) {
        particles.push({
            x: target.x, y: target.y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 20, color: color, size: 3
        });
    }

    if(target.hp <= 0) {
        target.hp = 0;
        if(target === robin) {
            if(robin.phase === 1) {
                robin.phase = 2;
                robin.hp = robin.maxHp = 600;
                robin.ghostHp = 600;
                addLog("ROBIN: THIS ISN'T EVEN MY FINAL FORM!", "#cc00ff");
                triggerShake(15, 30);
            } else {
                robin.alive = false;
                addLog("ROBIN HAS BEEN DEFEATED!", "#fff");
                if(!infiniteMode) gameStatus = "players_win";
                else setTimeout(reviveRobin, 3000);
            }
        } else {
            target.alive = false;
            target.respawn = 600; // ~10 seconds at 60fps
            addLog(`${target.name} was eliminated!`, "#ff4444");
            
            if(runners.every(r => !r.alive)) {
                gameStatus = "robin_win";
                addLog("ROBIN: PATHETIC MORTALS.", "#ff0000");
            }
        }
    }
}

function reviveRobin() {
    robin.alive = true; robin.hp = robin.maxHp = 700; robin.ghostHp = 700;
    robin.x = canvas.width/2; robin.y = canvas.height/2;
    addLog("ROBIN RESURRECTED!", "#cc00ff");
}

// --- AI Logic ---

function updateRobin(dt) {
    if(!robin.alive || gameStatus !== "playing") return;

    robin.dazed -= 1;
    const speed = (robin.dazed > 0) ? 0.4 : (robin.phase === 2 ? 1.4 : 1.0);

    // Telegraph Handling
    if(robin.telegraph.timer > 0) {
        robin.telegraph.timer--;
        if(robin.telegraph.timer === 0) {
            if(robin.telegraph.type === "slam") {
                triggerShake(20, 20);
                runners.forEach(r => {
                    if(r.alive && dist(r, robin) < 250) damage(r, 45);
                });
            } else if(robin.telegraph.type === "dash") {
                triggerShake(10, 15);
                const n = { x: Math.cos(robin.facing), y: Math.sin(robin.facing) };
                robin.vx += n.x * 40;
                robin.vy += n.y * 40;
                runners.forEach(r => {
                    if(r.alive && dist(r, robin) < 150) damage(r, 30);
                });
            }
            robin.telegraph.type = null;
        }
        return; // Locked in animation
    }

    // Cooldowns
    robin.slashCd--; robin.orbCd--; robin.slamCd--; robin.dashCd--;

    const target = runners.filter(r => r.alive).sort((a,b) => dist(a, robin) - dist(b, robin))[0];
    if(!target) return;

    const dx = target.x - robin.x;
    const dy = target.y - robin.y;
    const d = Math.hypot(dx, dy);
    robin.facing = Math.atan2(dy, dx);

    // Movement
    const n = norm(dx, dy);
    robin.vx += n.x * 0.3 * speed;
    robin.vy += n.y * 0.3 * speed;
    robin.vx *= 0.92; robin.vy *= 0.92;
    robin.x += robin.vx; robin.y += robin.vy;

    // Boundary check
    robin.x = Math.max(50, Math.min(canvas.width - 50, robin.x));
    robin.y = Math.max(50, Math.min(canvas.height - 50, robin.y));

    // Attacks
    if(d < 100 && robin.slashCd <= 0) {
        damage(target, 12);
        robin.slashCd = 40;
    }
    if(d < 220 && robin.slamCd <= 0) {
        robin.telegraph = { type: "slam", timer: 60 };
        robin.slamCd = 400;
        addLog("Robin prepares SLAM", "#ff8800");
    }
    if(d > 350 && robin.dashCd <= 0) {
        robin.telegraph = { type: "dash", timer: 40 };
        robin.dashCd = 300;
    }
}

function updateRunners(dt) {
    if(gameStatus !== "playing") return;

    runners.forEach(r => {
        if(!r.alive) {
            r.respawn--;
            if(r.respawn <= 0) {
                r.alive = true; r.hp = r.maxHp; r.ghostHp = r.maxHp;
                r.x = Math.random() * canvas.width; r.y = Math.random() * canvas.height;
                addLog(`${r.name} respawned!`, "#00ff00");
            }
            return;
        }

        const d = dist(r, robin);
        const n = norm(robin.x - r.x, robin.y - r.y);
        let move = { x: 0, y: 0 };

        // --- Role Logic ---
        if(r.role === "berserker") {
            r.slashCd--; r.healCd--;
            // Healing Synergy
            const lowAlly = runners.find(a => a.alive && a.hp < a.maxHp * 0.5);
            if(lowAlly && r.healCd <= 0) {
                r.healCd = 700;
                addLog("Erim: HEALING CRY!", "#00ff88");
                runners.forEach(a => { if(a.alive && dist(r, a) < 400) a.hp = Math.min(a.maxHp, a.hp + 35); });
            }
            if(d > 70) { move.x += n.x; move.y += n.y; }
            if(d < 100 && r.slashCd <= 0) { damage(robin, 10, "#fff"); r.slashCd = 30; }
        }

        if(r.role === "trickster") {
            r.bombCd--;
            if(r.bombCd <= 0 && d < 500) {
                r.bombCd = 400;
                robin.dazed = 180;
                addLog("Leif: DAZE BOMB!", "#ffee00");
                triggerShake(5, 10);
            }
            if(d < 300) { move.x -= n.x; move.y -= n.y; }
            move.x += -n.y * 0.5; move.y += n.x * 0.5; // Orbit
        }

        if(r.role === "sniper") {
            r.snipeCd--;
            if(r.snipeCd <= 0 && d > 200) {
                r.snipeCd = 180;
                damage(robin, 40, "#66ccff");
                addLog("Lennard: PIERCING SHOT", "#66ccff");
                triggerShake(8, 15);
            }
            if(d < 450) { move.x -= n.x; move.y -= n.y; }
        }

        // Apply
        r.vx += move.x * 0.3; r.vy += move.y * 0.3;
        r.vx *= 0.9; r.vy *= 0.9;
        r.x += r.vx; r.y += r.vy;

        // Boundaries
        r.x = Math.max(30, Math.min(canvas.width - 30, r.x));
        r.y = Math.max(30, Math.min(canvas.height - 30, r.y));
    });
}

// --- Graphics ---

function drawHP(e, color) {
    const barW = 60;
    if(e.ghostHp > e.hp) e.ghostHp -= 0.6;
    if(e.ghostHp < e.hp) e.ghostHp = e.hp;

    const bx = e.x - barW/2;
    const by = e.y - e.size/2 - 15;

    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(bx, by, barW, 6);
    ctx.fillStyle = "#fff";
    ctx.fillRect(bx, by, barW * (e.ghostHp / e.maxHp), 6);
    ctx.fillStyle = color;
    ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), 6);
}

function render() {
    ctx.save();
    
    // Shake
    if(shakeTime > 0) {
        ctx.translate((Math.random()-0.5)*shakePower, (Math.random()-0.5)*shakePower);
        shakeTime--;
    }

    // BG
    ctx.fillStyle = "#05050a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Arena Grid
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    for(let i=0; i<canvas.width; i+=80) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for(let i=0; i<canvas.height; i+=80) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Telegraphs
    if(robin.telegraph.type === "slam") {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 0, 0, 0.15)";
        ctx.arc(robin.x, robin.y, 250, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    if(robin.telegraph.type === "dash") {
        ctx.save();
        ctx.translate(robin.x, robin.y);
        ctx.rotate(robin.facing);
        ctx.fillStyle = "rgba(255, 100, 0, 0.15)";
        ctx.fillRect(0, -60, 600, 120);
        ctx.restore();
    }

    // Robin
    if(robin.alive) {
        ctx.save();
        ctx.shadowBlur = 30;
        ctx.shadowColor = robin.phase === 2 ? "#f0f" : "#f00";
        ctx.fillStyle = "#111";
        ctx.beginPath(); ctx.arc(robin.x, robin.y, robin.size/2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        drawHP(robin, robin.phase === 2 ? "#cc00ff" : "#ff4444");
    }

    // Players
    runners.forEach(r => {
        if(!r.alive) return;
        ctx.fillStyle = r.role === "berserker" ? "#00ff88" : (r.role === "sniper" ? "#00ccff" : "#ffee00");
        ctx.beginPath(); ctx.arc(r.x, r.y, r.size/2, 0, Math.PI*2); ctx.fill();
        drawHP(r, "#00ff88");
    });

    // Particles
    for(let i=particles.length-1; i>=0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.globalAlpha = p.life / 20;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        if(p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;

    // Overlays
    if(gameStatus !== "playing") {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 50px Arial";
        ctx.fillText(gameStatus === "robin_win" ? "ROBIN VICTORIOUS" : "RUNNERS TRIUMPHANT", canvas.width/2, canvas.height/2);
        ctx.font = "20px Arial";
        ctx.fillText("Reloading Arena in 5 seconds...", canvas.width/2, canvas.height/2 + 50);
        
        statusTimer++;
        if(statusTimer > 300) location.reload();
    }

    ctx.restore();
    requestAnimationFrame(render);
}

// Loop
setInterval(() => {
    updateRobin();
    updateRunners();
}, 16);

render();

</script>
</body>
</html>
