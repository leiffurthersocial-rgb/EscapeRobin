<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin Arena Final</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background:
        radial-gradient(circle at center, #24243d 0%, #101018 60%, #040406 100%);
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 12px;
    left: 12px;
    color: white;
    background: rgba(0,0,0,0.35);
    padding: 12px 16px;
    border-radius: 14px;
    backdrop-filter: blur(5px);
    font-size: 14px;
    line-height: 1.45;
    max-width: 420px;
}

#ui b {
    color: #ff8080;
}
</style>
</head>
<body>

<div id="ui">
<b>Robin Arena Final</b><br>
Leif = berserker melee diver<br>
Lennard = sniper assassin (high-risk close shot)<br>
Erim = trickster bomber/support<br>
Robin = predator boss with dash/slam/orbs
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

function rand(min,max){ return Math.random()*(max-min)+min; }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

function dist(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function norm(x,y){
    const l = Math.hypot(x,y) || 1;
    return {x:x/l,y:y/l};
}

function load(src){
    const i = new Image();
    i.src = src;
    return i;
}

const imgs = {
    robin: load("robin.jpeg"),
    leif: load("leif.jpeg"),
    lennard: load("lennard.jpeg"),
    erim: load("erim.jpeg")
};

const particles = [];
const projectiles = [];
const powerups = [];
const texts = [];

function burst(x,y,color,count=18){

    for(let i=0;i<count;i++){

        particles.push({
            x,y,
            vx: rand(-5,5),
            vy: rand(-5,5),
            life: rand(20,45),
            color,
            size: rand(2,5)
        });
    }
}

function textPop(x,y,text,color){

    texts.push({
        x,y,text,color,
        vy: -1,
        life: 60
    });
}

// ---------- ROBIN ----------
const robin = {
    x: canvas.width/2,
    y: canvas.height/2,

    vx: 0,
    vy: 0,

    size: 88,

    hp: 260,
    maxHp: 260,

    alive: true,

    facing: 0,

    slashCd: 0,
    orbCd: 0,
    dashCd: 0,
    slamCd: 0,

    shield: 0,

    state: "idle",
    stateTimer: 0,

    speedBuff: 1,
    damageBuff: 1
};

// ---------- PLAYERS ----------
const runners = [

{
    name: "leif",
    role: "berserker",

    x: 300,
    y: 300,

    vx: 0,
    vy: 0,

    hp: 115,
    maxHp: 115,

    size: 46,

    alive: true,

    immunity: 2000,

    slashCd: 0,
    leapCd: 0,

    damageBuff: 1,
    speedBuff: 1,

    dance: 0
},

{
    name: "lennard",
    role: "sniper",

    x: 900,
    y: 500,

    vx: 0,
    vy: 0,

    hp: 78,
    maxHp: 78,

    size: 42,

    alive: true,

    immunity: 2000,

    snipeCd: 0,
    panicShotCd: 0,
    dodgeCd: 0,

    damageBuff: 1,
    speedBuff: 1,

    dance: 0
},

{
    name: "erim",
    role: "trickster",

    x: 700,
    y: 700,

    vx: 0,
    vy: 0,

    hp: 95,
    maxHp: 95,

    size: 44,

    alive: true,

    immunity: 2000,

    bombCd: 0,
    zapCd: 0,

    damageBuff: 1,
    speedBuff: 1,

    dance: 0
}

];

// ---------- POWERUPS ----------
function spawnPowerup(){

    const types = ["heal","speed","damage","shield"];

    powerups.push({
        x: rand(100,canvas.width-100),
        y: rand(100,canvas.height-100),
        type: types[Math.floor(Math.random()*types.length)],
        pulse: rand(0,999)
    });
}

for(let i=0;i<6;i++) spawnPowerup();

// ---------- DAMAGE ----------
function damage(target,amount,sourceX,sourceY){

    if(!target.alive) return;

    if(target.immunity > 0) return;

    // shield absorb
    if(target.shield > 0){

        const absorbed = Math.min(target.shield, amount);

        target.shield -= absorbed;
        amount -= absorbed;
    }

    if(amount <= 0) return;

    target.hp -= amount;

    textPop(
        target.x,
        target.y - 20,
        "-" + Math.round(amount),
        "#ff7777"
    );

    burst(target.x,target.y,"#ff5555",10);

    const dx = target.x-sourceX;
    const dy = target.y-sourceY;

    const n = norm(dx,dy);

    target.vx += n.x * amount * 0.03;
    target.vy += n.y * amount * 0.03;

    if(target.hp <= 0){

        target.hp = 0;

        if(target === robin){

            robin.alive = false;

            burst(robin.x,robin.y,"white",120);

            for(const r of runners){
                if(r.alive){
                    r.dance = rand(0,100);
                }
            }

        } else {

            target.alive = false;
            target.respawn = rand(2500,5000);

            burst(target.x,target.y,"#ff2222",45);
        }
    }
}

// ---------- HEAL ----------
function heal(entity,amount){

    entity.hp = Math.min(entity.maxHp, entity.hp + amount);
}

// ---------- PROJECTILES ----------
function shoot(owner,x,y,angle,speed,damageAmount,color,size=5,type="bullet"){

    projectiles.push({
        owner,
        x,
        y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        damage: damageAmount,
        color,
        size,
        type,
        life: 220
    });
}

// ---------- ROBIN AI ----------
function updateRobin(dt){

    if(!robin.alive) return;

    robin.slashCd -= dt;
    robin.orbCd -= dt;
    robin.dashCd -= dt;
    robin.slamCd -= dt;

    // nearest target
    let target = null;
    let best = Infinity;

    for(const r of runners){

        if(!r.alive) continue;

        const d = dist(robin,r);

        if(d < best){
            best = d;
            target = r;
        }
    }

    if(!target) return;

    const dx = target.x-robin.x;
    const dy = target.y-robin.y;

    const d = Math.hypot(dx,dy);

    const n = norm(dx,dy);

    robin.facing = Math.atan2(dy,dx);

    // movement
    robin.vx += n.x * 0.18;
    robin.vy += n.y * 0.18;

    robin.vx *= 0.93;
    robin.vy *= 0.93;

    robin.x += robin.vx * 1.8 * robin.speedBuff;
    robin.y += robin.vy * 1.8 * robin.speedBuff;

    robin.x = clamp(robin.x,80,canvas.width-80);
    robin.y = clamp(robin.y,80,canvas.height-80);

    // slash
    if(d < 100 && robin.slashCd <= 0){

        robin.slashCd = 700;

        damage(target,16*robin.damageBuff,robin.x,robin.y);
    }

    // orb attack
    if(d > 140 && robin.orbCd <= 0){

        robin.orbCd = 2400;

        for(let i=-1;i<=1;i++){

            shoot(
                robin,
                robin.x,
                robin.y,
                robin.facing + i*0.15,
                6,
                13*robin.damageBuff,
                "#ff6666",
                7,
                "orb"
            );
        }
    }

    // dash attack
    if(d > 130 && d < 300 && robin.dashCd <= 0){

        robin.dashCd = 4200;

        robin.vx += n.x * 10;
        robin.vy += n.y * 10;

        damage(target,20*robin.damageBuff,robin.x,robin.y);
    }

    // slam
    if(d < 160 && robin.slamCd <= 0){

        robin.slamCd = 7000;

        for(const r of runners){

            if(!r.alive) continue;

            if(dist(robin,r) < 160){

                damage(
                    r,
                    24*robin.damageBuff,
                    robin.x,
                    robin.y
                );
            }
        }

        burst(robin.x,robin.y,"#ff4444",50);
    }
}

// ---------- RUNNER AI ----------
function updateRunner(r,dt){

    if(!r.alive){

        r.respawn -= dt;

        if(r.respawn <= 0 && robin.alive){

            r.alive = true;

            r.hp = r.maxHp;

            r.immunity = 2000;

            r.x = rand(100,canvas.width-100);
            r.y = rand(100,canvas.height-100);

            burst(r.x,r.y,"#66ffcc",35);
        }

        return;
    }

    r.immunity -= dt;

    const dx = robin.x-r.x;
    const dy = robin.y-r.y;

    const d = Math.hypot(dx,dy);

    const n = norm(dx,dy);

    // movement personalities
    let moveX = 0;
    let moveY = 0;

    // ---------- LEIF ----------
    if(r.role === "berserker"){

        r.slashCd -= dt;
        r.leapCd -= dt;

        // aggressive orbiting
        if(d > 90){
            moveX += n.x * 0.7;
            moveY += n.y * 0.7;
        }

        moveX += -n.y * 0.3;
        moveY += n.x * 0.3;

        // slash
        if(d < 95 && r.slashCd <= 0){

            r.slashCd = 650;

            damage(
                robin,
                11*r.damageBuff,
                r.x,
                r.y
            );
        }

        // leap
        if(d > 120 && d < 280 && r.leapCd <= 0){

            r.leapCd = 4200;

            r.vx += n.x * 8;
            r.vy += n.y * 8;

            damage(
                robin,
                22*r.damageBuff,
                r.x,
                r.y
            );

            burst(r.x,r.y,"#ffee55",18);
        }
    }

    // ---------- LENNARD ----------
    else if(r.role === "sniper"){

        r.snipeCd -= dt;
        r.panicShotCd -= dt;
        r.dodgeCd -= dt;

        // KEEP DISTANCE
        if(d < 320){

            moveX -= n.x * 1.2;
            moveY -= n.y * 1.2;
        }

        moveX += -n.y * 0.18;
        moveY += n.x * 0.18;

        // LONG RANGE SHOT
        if(d > 180 && r.snipeCd <= 0){

            r.snipeCd = 550;

            const angle = Math.atan2(dy,dx);

            shoot(
                r,
                r.x,
                r.y,
                angle,
                10,
                8*r.damageBuff,
                "#66ccff",
                4
            );
        }

        // HIGH RISK CLOSE SHOT
        if(d < 120 && r.panicShotCd <= 0){

            r.panicShotCd = 3200;

            const angle = Math.atan2(dy,dx);

            shoot(
                r,
                r.x,
                r.y,
                angle,
                14,
                32*r.damageBuff,
                "#ffee55",
                8,
                "rail"
            );

            // dodge backwards
            r.vx -= n.x * 10;
            r.vy -= n.y * 10;

            burst(r.x,r.y,"#ffee55",22);
        }

        // emergency dodge
        if(d < 100 && r.dodgeCd <= 0){

            r.dodgeCd = 2400;

            r.vx -= n.x * 12;
            r.vy -= n.y * 12;
        }
    }

    // ---------- ERIM ----------
    else if(r.role === "trickster"){

        r.bombCd -= dt;
        r.zapCd -= dt;

        // medium range chaotic orbit
        if(d > 170){
            moveX += n.x * 0.5;
            moveY += n.y * 0.5;
        }

        if(d < 130){
            moveX -= n.x * 0.9;
            moveY -= n.y * 0.9;
        }

        moveX += -n.y * 0.55;
        moveY += n.x * 0.55;

        // bomb
        if(d > 120 && d < 340 && r.bombCd <= 0){

            r.bombCd = 1700;

            const angle = Math.atan2(dy,dx);

            shoot(
                r,
                r.x,
                r.y,
                angle,
                5,
                18*r.damageBuff,
                "#ff8888",
                9,
                "bomb"
            );
        }

        // zap
        if(d < 220 && r.zapCd <= 0){

            r.zapCd = 500;

            const angle = Math.atan2(dy,dx);

            shoot(
                r,
                r.x,
                r.y,
                angle + rand(-0.15,0.15),
                8,
                6*r.damageBuff,
                "#ffd166",
                5
            );
        }
    }

    // avoid corners
    const margin = 170;

    if(r.x < margin) moveX += 1;
    if(r.x > canvas.width-margin) moveX -= 1;

    if(r.y < margin) moveY += 1;
    if(r.y > canvas.height-margin) moveY -= 1;

    // seek powerups if weak
    if(r.hp < r.maxHp*0.55){

        let nearest = null;
        let nearestD = Infinity;

        for(const p of powerups){

            if(p.type !== "heal") continue;

            const pd = dist(r,p);

            if(pd < nearestD){

                nearestD = pd;
                nearest = p;
            }
        }

        if(nearest){

            const pdx = nearest.x-r.x;
            const pdy = nearest.y-r.y;

            const pn = norm(pdx,pdy);

            moveX += pn.x * 1.3;
            moveY += pn.y * 1.3;
        }
    }

    // movement apply
    r.vx += moveX * 0.12;
    r.vy += moveY * 0.12;

    r.vx *= 0.93;
    r.vy *= 0.93;

    r.x += r.vx * 2.2 * r.speedBuff;
    r.y += r.vy * 2.2 * r.speedBuff;

    r.x = clamp(r.x,30,canvas.width-30);
    r.y = clamp(r.y,30,canvas.height-30);

    // victory dance
    if(!robin.alive){

        r.dance += dt*0.01;

        r.x += Math.sin(r.dance)*2;
        r.y += Math.cos(r.dance*2)*2;
    }
}

// ---------- PROJECTILES ----------
function updateProjectiles(dt){

    for(let i=projectiles.length-1;i>=0;i--){

        const p = projectiles[i];

        p.x += p.vx;
        p.y += p.vy;

        p.life -= dt;

        // bomb explosion
        if(p.type === "bomb" && p.life < 120){

            burst(p.x,p.y,"#ff8888",20);

            if(dist(p,robin) < 90){

                damage(
                    robin,
                    p.damage,
                    p.x,
                    p.y
                );
            }

            projectiles.splice(i,1);
            continue;
        }

        // robin hit
        if(p.owner !== robin && robin.alive){

            if(dist(p,robin) < robin.size*0.45){

                damage(
                    robin,
                    p.damage,
                    p.x,
                    p.y
                );

                projectiles.splice(i,1);
                continue;
            }
        }

        // player hit
        if(p.owner === robin){

            for(const r of runners){

                if(!r.alive) continue;

                if(dist(p,r) < r.size*0.45){

                    damage(
                        r,
                        p.damage,
                        p.x,
                        p.y
                    );

                    projectiles.splice(i,1);
                    break;
                }
            }
        }

        if(p.life <= 0){

            projectiles.splice(i,1);
        }
    }
}

// ---------- POWERUPS ----------
function updatePowerups(dt){

    for(let i=powerups.length-1;i>=0;i--){

        const p = powerups[i];

        p.pulse += dt*0.004;

        // robin collect
        if(robin.alive && dist(robin,p) < 50){

            applyPowerup(robin,p.type);

            powerups.splice(i,1);
            spawnPowerup();
            continue;
        }

        // runners collect
        for(const r of runners){

            if(!r.alive) continue;

            if(dist(r,p) < 35){

                applyPowerup(r,p.type);

                powerups.splice(i,1);

                spawnPowerup();

                break;
            }
        }
    }
}

function applyPowerup(entity,type){

    if(type === "heal"){

        heal(entity,entity.maxHp*0.3);

        textPop(entity.x,entity.y,"+HP","#66ff99");
    }

    if(type === "speed"){

        entity.speedBuff = 1.35;

        setTimeout(()=>{
            entity.speedBuff = 1;
        },7000);

        textPop(entity.x,entity.y,"SPD","#66ccff");
    }

    if(type === "damage"){

        entity.damageBuff = 1.5;

        setTimeout(()=>{
            entity.damageBuff = 1;
        },7000);

        textPop(entity.x,entity.y,"DMG","#ff6666");
    }

    if(type === "shield"){

        entity.shield = Math.min(40, entity.shield + 20);

        textPop(entity.x,entity.y,"SHIELD","#bb66ff");
    }
}

// ---------- PARTICLES ----------
function updateParticles(dt){

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;

        p.vx *= 0.97;
        p.vy *= 0.97;

        p.life--;

        if(p.life <= 0){
            particles.splice(i,1);
        }
    }

    for(let i=texts.length-1;i>=0;i--){

        const t = texts[i];

        t.y += t.vy;

        t.life--;

        if(t.life <= 0){
            texts.splice(i,1);
        }
    }
}

// ---------- DRAW ----------
function drawArena(){

    const t = performance.now()*0.015;

    ctx.strokeStyle = "rgba(255,255,255,0.04)";

    for(let x=-50;x<canvas.width+50;x+=50){

        ctx.beginPath();
        ctx.moveTo(x+(t%50),0);
        ctx.lineTo(x+(t%50),canvas.height);
        ctx.stroke();
    }

    for(let y=-50;y<canvas.height+50;y+=50){

        ctx.beginPath();
        ctx.moveTo(0,y+(t%50));
        ctx.lineTo(canvas.width,y+(t%50));
        ctx.stroke();
    }
}

function drawImage(img,x,y,size,glow,alpha=1,rot=0){

    ctx.save();

    ctx.translate(x,y);
    ctx.rotate(rot);

    ctx.globalAlpha = alpha;

    ctx.shadowColor = glow;
    ctx.shadowBlur = 25;

    ctx.drawImage(
        img,
        -size/2,
        -size/2,
        size,
        size
    );

    ctx.restore();
}

function drawHealth(entity,color){

    ctx.fillStyle = "#000";

    ctx.fillRect(
        entity.x-25,
        entity.y-entity.size/2-16,
        50,
        6
    );

    ctx.fillStyle = color;

    ctx.fillRect(
        entity.x-25,
        entity.y-entity.size/2-16,
        50*(entity.hp/entity.maxHp),
        6
    );
}

function render(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawArena();

    // powerups
    for(const p of powerups){

        let color = "#66ccff";

        if(p.type==="heal") color="#66ff99";
        if(p.type==="damage") color="#ff6666";
        if(p.type==="shield") color="#bb66ff";

        ctx.beginPath();

        ctx.fillStyle = color;

        ctx.shadowColor = color;
        ctx.shadowBlur = 20;

        ctx.arc(
            p.x,
            p.y,
            12+Math.sin(p.pulse)*2,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    // particles
    for(const p of particles){

        ctx.globalAlpha = p.life/45;

        ctx.fillStyle = p.color;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    }

    ctx.globalAlpha = 1;

    // projectiles
    for(const p of projectiles){

        ctx.beginPath();

        ctx.fillStyle = p.color;

        ctx.shadowColor = p.color;
        ctx.shadowBlur = 16;

        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

        ctx.fill();
    }

    // robin
    if(robin.alive){

        drawImage(
            imgs.robin,
            robin.x,
            robin.y,
            robin.size,
            "#ff4444",
            1,
            robin.facing*0.08
        );

        drawHealth(robin,"#ff5555");

    } else {

        drawImage(
            imgs.robin,
            robin.x,
            robin.y,
            robin.size,
            "#ffffff",
            0.3,
            performance.now()*0.001
        );

        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";

        ctx.fillText(
            "ROBIN DEFEATED",
            canvas.width/2-170,
            80
        );
    }

    // runners
    for(const r of runners){

        if(!r.alive) continue;

        let glow = "#66aaff";

        if(r.role==="berserker") glow="#66ff99";
        if(r.role==="sniper") glow="#66ccff";
        if(r.role==="trickster") glow="#ffd166";

        drawImage(
            imgs[r.name],
            r.x,
            r.y,
            r.size,
            glow,
            r.immunity > 0
                ? 0.5 + Math.sin(performance.now()*0.02)*0.3
                : 1,
            Math.sin(performance.now()*0.002+r.x)*0.05
        );

        drawHealth(r,"#66ff99");

        // victory dance rings
        if(!robin.alive){

            ctx.strokeStyle =
                `hsla(${(performance.now()*0.08+r.x)%360},100%,70%,0.7)`;

            ctx.beginPath();

            ctx.arc(
                r.x,
                r.y,
                32+Math.sin(r.dance*4)*8,
                0,
                Math.PI*2
            );

            ctx.stroke();
        }
    }

    // floating texts
    for(const t of texts){

        ctx.globalAlpha = t.life/60;

        ctx.fillStyle = t.color;

        ctx.font = "bold 16px Arial";

        ctx.fillText(t.text,t.x,t.y);
    }

    ctx.globalAlpha = 1;
}

// ---------- LOOP ----------
let last = performance.now();

function loop(now){

    const dt = now-last;
    last = now;

    updateRobin(dt);

    for(const r of runners){
        updateRunner(r,dt);
    }

    updateProjectiles(dt);
    updatePowerups(dt);
    updateParticles(dt);

    render();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
