<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin Arena – Synergy & Telegraph</title>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #24243d 0%, #101018 60%, #040406 100%);
            font-family: Arial, sans-serif;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        .ui-btn {
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }
        .ui-btn:hover { background: rgba(255,255,255,0.12); }
        .ui-btn.active {
            background: rgba(204,0,255,0.4);
            border-color: #cc00ff;
            box-shadow: 0 0 10px #cc00ff;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="inf-toggle" class="ui-btn">Infinite Mode: OFF</button>
        <button id="shake-toggle" class="ui-btn active">Camera Shake: ON</button>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // ---------- UI STATE ----------
        let infiniteMode = false;
        let cameraShakeOn = true;
        let pDeaths = 0;
        let rDeaths = 0;

        // Camera shake
        let shakeIntensity = 0;
        const MAX_SHAKE = 18;

        // Chat log
        const chatMessages = [];

        // Victory state
        let robinVictory = false;
        let victoryTimer = 0;
        const VICTORY_DURATION = 4000; // ms

        // ---------- TOGGLES ----------
        document.getElementById('inf-toggle').addEventListener('click', function() {
            infiniteMode = !infiniteMode;
            this.classList.toggle('active', infiniteMode);
            this.innerText = `Infinite Mode: ${infiniteMode ? 'ON' : 'OFF'}`;
            if (infiniteMode && !robin.alive) respawnRobin();
        });

        document.getElementById('shake-toggle').addEventListener('click', function() {
            cameraShakeOn = !cameraShakeOn;
            this.classList.toggle('active', cameraShakeOn);
            this.innerText = `Camera Shake: ${cameraShakeOn ? 'ON' : 'OFF'}`;
        });

        // ---------- HELPER FUNCTIONS ----------
        function resize() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
        }
        addEventListener("resize", resize);
        resize();

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
        function norm(x, y) {
            const l = Math.hypot(x, y) || 1;
            return { x: x / l, y: y / l };
        }

        function load(src) {
            const i = new Image();
            i.src = src;
            return i;
        }

        const imgs = {
            robin: load("robin.jpeg"),
            leif: load("leif.jpeg"),
            lennard: load("lennard.jpeg"),
            erim: load("erim.jpeg")
        };

        // ---------- GAME OBJECTS ----------
        const particles = [];
        const projectiles = [];
        const powerups = [];
        const texts = [];

        // ---------- ENTITIES ----------
        const robin = {
            x: canvas.width / 2, y: canvas.height / 2,
            vx: 0, vy: 0,
            size: 88,
            hp: 260, maxHp: 260, ghostHp: 260,
            phase: 1,
            alive: true,
            immunity: 0,
            facing: 0,
            slashCd: 0, orbCd: 0, dashCd: 0, slamCd: 0,
            shield: 0,
            speedBuff: 1, damageBuff: 1,
            slamTelegraph: null   // { remaining, total, x, y }
        };

        const runners = [
            {
                name: "leif", role: "support",  // was trickster, now healer
                x: 300, y: 300, vx: 0, vy: 0,
                hp: 90, maxHp: 90, ghostHp: 90,
                size: 44, alive: true, immunity: 2000,
                healBombCd: 0, zapCd: 0, damageBuff: 1, speedBuff: 1, dance: 0
            },
            {
                name: "lennard", role: "sniper",
                x: 900, y: 500, vx: 0, vy: 0,
                hp: 78, maxHp: 78, ghostHp: 78,
                size: 42, alive: true, immunity: 2000,
                snipeCd: 0, panicShotCd: 0, dodgeCd: 0, damageBuff: 1, speedBuff: 1, dance: 0
            },
            {
                name: "erim", role: "berserker",
                x: 700, y: 700, vx: 0, vy: 0,
                hp: 115, maxHp: 115, ghostHp: 115,
                size: 46, alive: true, immunity: 2000,
                slashCd: 0, leapCd: 0, protectCd: 0, damageBuff: 1, speedBuff: 1, dance: 0
            }
        ];

        // ---------- POWERUPS ----------
        function spawnPowerup() {
            const types = ["heal", "speed", "damage", "shield"];
            let px, py;
            do {
                px = rand(80, canvas.width - 80);
                py = rand(80, canvas.height - 80);
                // keep away from edges, no pillars
            } while (px < 50 || px > canvas.width - 50 || py < 50 || py > canvas.height - 50);
            powerups.push({
                x: px, y: py,
                type: types[Math.floor(Math.random() * types.length)],
                pulse: rand(0, 999)
            });
        }
        for (let i = 0; i < 6; i++) spawnPowerup();

        // ---------- COMBAT & EFFECTS ----------
        function burst(x, y, color, count = 18) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: rand(-5, 5),
                    vy: rand(-5, 5),
                    life: rand(20, 45),
                    color,
                    size: rand(2, 5)
                });
            }
        }

        function textPop(x, y, text, color) {
            texts.push({ x, y, text, color, vy: -1, life: 60 });
        }

        function addChat(text) {
            chatMessages.push({ text, life: 5000 }); // 5 sec
            while (chatMessages.length > 6) chatMessages.shift(); // limit history
        }

        function addShake(amount) {
            if (!cameraShakeOn) return;
            shakeIntensity = Math.min(shakeIntensity + amount, MAX_SHAKE);
        }

        function getNearestPowerup(entity, type = null, maxDist = Infinity) {
            let best = null, minDist = maxDist;
            for (const p of powerups) {
                if (type && p.type !== type) continue;
                const d = dist(entity, p);
                if (d < minDist) { minDist = d; best = p; }
            }
            return best;
        }

        function respawnRobin() {
            robin.alive = true;
            robin.phase = 2;
            robin.maxHp = 350;
            robin.hp = robin.maxHp;
            robin.ghostHp = robin.maxHp;
            robin.immunity = 1500;
            robin.x = canvas.width / 2;
            robin.y = canvas.height / 2;
            robin.slashCd = robin.orbCd = robin.dashCd = robin.slamCd = 0;
            robin.slamTelegraph = null;
            burst(robin.x, robin.y, "#cc00ff", 80);
            textPop(robin.x, robin.y - 40, "RESPAWNED!", "#cc00ff");
            addChat("Robin RESPAWNED!");
            addShake(10);
        }

        function damage(target, amount, sourceX, sourceY) {
            if (!target.alive) return;
            if (target.immunity > 0) return;
            if (target.shield > 0) {
                const absorbed = Math.min(target.shield, amount);
                target.shield -= absorbed;
                amount -= absorbed;
            }
            if (amount <= 0) return;
            target.hp -= amount;
            textPop(target.x, target.y - 20, "-" + Math.round(amount), "#ff7777");
            burst(target.x, target.y, "#ff5555", 10);
            const dx = target.x - sourceX, dy = target.y - sourceY;
            const n = norm(dx, dy);
            target.vx += n.x * amount * 0.03;
            target.vy += n.y * amount * 0.03;

            if (target.hp <= 0) {
                target.hp = 0;
                if (target === robin) {
                    if (robin.phase === 1) {
                        robin.phase = 2;
                        robin.maxHp = 350;
                        robin.hp = robin.maxHp;
                        robin.ghostHp = robin.maxHp;
                        robin.speedBuff = 1.35;
                        robin.damageBuff = 1.25;
                        robin.slashCd = robin.orbCd = robin.dashCd = robin.slamCd = 0;
                        robin.slamTelegraph = null;
                        burst(robin.x, robin.y, "#cc00ff", 80);
                        textPop(robin.x, robin.y - 40, "PHASE 2!", "#cc00ff");
                        addChat("Robin enters PHASE 2!");
                        addShake(12);
                    } else {
                        if (infiniteMode) {
                            rDeaths++;
                            respawnRobin();
                        } else {
                            robin.alive = false;
                            burst(robin.x, robin.y, "white", 120);
                            for (const r of runners) if (r.alive) r.dance = rand(0, 100);
                            addShake(15);
                            addChat("Robin DEFEATED!");
                        }
                    }
                } else {
                    target.alive = false;
                    target.respawn = rand(8000, 12000); // balanced window for Robin
                    pDeaths++;
                    burst(target.x, target.y, "#ff2222", 45);
                    addChat(`${target.name.toUpperCase()} down!`);
                }
            }
        }

        function heal(entity, amount) {
            entity.hp = Math.min(entity.maxHp, entity.hp + amount);
            textPop(entity.x, entity.y, "+" + Math.round(amount), "#66ff99");
        }

        function shoot(owner, x, y, angle, speed, damageAmount, color, size = 5, type = "bullet", extra = {}) {
            projectiles.push({
                owner, x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                damage: damageAmount, color, size, type, life: 220,
                ...extra
            });
        }

        // ---------- ROBIN AI ----------
        function updateRobin(dt) {
            if (!robin.alive) return;
            robin.immunity -= dt;
            const cdSpeed = robin.phase === 2 ? 1.2 : 1;
            robin.slashCd -= dt * cdSpeed;
            robin.orbCd -= dt * cdSpeed;
            robin.dashCd -= dt * cdSpeed;
            robin.slamCd -= dt * cdSpeed;

            // Slam telegraph timer
            if (robin.slamTelegraph) {
                robin.slamTelegraph.remaining -= dt;
                if (robin.slamTelegraph.remaining <= 0) {
                    // Execute slam
                    const cx = robin.slamTelegraph.x, cy = robin.slamTelegraph.y;
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist({ x: cx, y: cy }, r) < 160) damage(r, 24 * robin.damageBuff, cx, cy);
                    }
                    burst(cx, cy, robin.phase === 2 ? "#cc00ff" : "#ff4444", 50);
                    addChat("Robin used SLAM!");
                    addShake(14);
                    robin.slamTelegraph = null;
                }
            }

            // Phase 2 ambient particles
            if (robin.phase === 2 && Math.random() < 0.25) {
                particles.push({
                    x: robin.x + rand(-30, 30),
                    y: robin.y + rand(-30, 30),
                    vx: rand(-1, 1), vy: rand(-3, -1),
                    life: rand(15, 35), color: "#cc00ff", size: rand(2, 4)
                });
            }

            let target = null, bestDist = Infinity;
            for (const r of runners) {
                if (!r.alive) continue;
                const d = dist(robin, r);
                if (d < bestDist) { bestDist = d; target = r; }
            }
            if (!target) return;

            const dx = target.x - robin.x, dy = target.y - robin.y;
            const d = Math.hypot(dx, dy);
            const n = norm(dx, dy);
            robin.facing = Math.atan2(dy, dx);

            let moveX = n.x, moveY = n.y;

            // Powerup interest
            let healTarget = null;
            if (robin.hp < robin.maxHp * 0.5) healTarget = getNearestPowerup(robin, "heal");
            else healTarget = getNearestPowerup(robin, null, 180);
            if (healTarget) {
                const pn = norm(healTarget.x - robin.x, healTarget.y - robin.y);
                const weight = (healTarget.type === "heal" && robin.hp < robin.maxHp * 0.5) ? 1.5 : 0.8;
                moveX += pn.x * weight;
                moveY += pn.y * weight;
            }

            const moveN = norm(moveX, moveY);
            robin.vx += moveN.x * 0.18;
            robin.vy += moveN.y * 0.18;
            robin.vx *= 0.93;
            robin.vy *= 0.93;
            robin.x += robin.vx * 1.8 * robin.speedBuff;
            robin.y += robin.vy * 1.8 * robin.speedBuff;
            robin.x = clamp(robin.x, 80, canvas.width - 80);
            robin.y = clamp(robin.y, 80, canvas.height - 80);

            // Slash
            if (d < 100 && robin.slashCd <= 0) {
                robin.slashCd = 700;
                damage(target, 16 * robin.damageBuff, robin.x, robin.y);
                addChat("Robin used SLASH");
            }

            // Orbs
            if (d > 140 && robin.orbCd <= 0) {
                robin.orbCd = 2400;
                const orbs = robin.phase === 2 ? 2 : 1;
                for (let i = -orbs; i <= orbs; i++) {
                    shoot(robin, robin.x, robin.y, robin.facing + i * 0.15, 6,
                        13 * robin.damageBuff, robin.phase === 2 ? "#cc00ff" : "#ff6666", 7, "orb");
                }
                addChat("Robin fired ORBS");
            }

            // Dash
            if (d > 130 && d < 300 && robin.dashCd <= 0) {
                robin.dashCd = 4200;
                robin.vx += n.x * 10;
                robin.vy += n.y * 10;
                damage(target, 20 * robin.damageBuff, robin.x, robin.y);
                addChat("Robin DASHED");
                addShake(6);
            }

            // Slam (telegraph instead of instant)
            if (d < 160 && robin.slamCd <= 0 && !robin.slamTelegraph) {
                robin.slamCd = 8000;
                robin.slamTelegraph = { remaining: 900, total: 900, x: robin.x, y: robin.y };
                addChat("Robin is winding up a SLAM!");
                addShake(2);
            }
        }

        // ---------- RUNNER AI ----------
        function updateRunner(r, dt) {
            if (!r.alive) {
                r.respawn -= dt;
                if (r.respawn <= 0 && robin.alive) {
                    r.alive = true;
                    r.hp = r.maxHp;
                    r.ghostHp = r.maxHp;
                    r.immunity = 2000;
                    r.x = rand(100, canvas.width - 100);
                    r.y = rand(100, canvas.height - 100);
                    burst(r.x, r.y, "#66ffcc", 35);
                    addChat(`${r.name} respawned.`);
                }
                return;
            }

            r.immunity -= dt;
            const dx = robin.x - r.x, dy = robin.y - r.y;
            const d = Math.hypot(dx, dy);
            const n = norm(dx, dy);

            const sniper = runners.find(b => b.role === "sniper");
            const sniperInDanger = sniper && sniper.alive && sniper.hp < sniper.maxHp * 0.4;

            let moveX = 0, moveY = 0;

            // ---------- SUPPORT (Leif) ----------
            if (r.role === "support") {
                r.healBombCd -= dt;
                r.zapCd -= dt;

                // Heal ally logic
                const allies = runners.filter(a => a.alive && a !== r && a.hp < a.maxHp * 0.5);
                let healTarget = null;
                if (allies.length > 0) {
                    // pick lowest HP
                    healTarget = allies.reduce((a, b) => a.hp < b.hp ? a : b);
                }

                if (healTarget && r.healBombCd <= 0 && dist(r, healTarget) > 40) {
                    // Fire heal bomb at ally
                    r.healBombCd = 8000;
                    const angle = Math.atan2(healTarget.y - r.y, healTarget.x - r.x);
                    shoot(r, r.x, r.y, angle, 5, 0, "#88ff88", 10, "healBomb", { healAmount: 30 });
                    addChat("Leif used HEAL BOMB");
                } else {
                    // Normal movement: stay at medium distance
                    if (d > 170) { moveX += n.x * 0.5; moveY += n.y * 0.5; }
                    if (d < 130) { moveX -= n.x * 0.9; moveY -= n.y * 0.9; }
                    moveX += -n.y * 0.55; moveY += n.x * 0.55;
                }

                // Zap attack
                if (d < 220 && r.zapCd <= 0) {
                    r.zapCd = 500;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx) + rand(-0.15, 0.15), 8, 6 * r.damageBuff, "#ffd166", 5);
                }
            }
            // ---------- BERSERKER ----------
            else if (r.role === "berserker") {
                r.slashCd -= dt;
                r.leapCd -= dt;
                r.protectCd -= dt;

                if (sniperInDanger && r.protectCd <= 0 && dist(r, sniper) < 200) {
                    // Shield the sniper
                    sniper.shield = Math.min(40, sniper.shield + 30);
                    r.protectCd = 10000;
                    burst(sniper.x, sniper.y, "#bb66ff", 20);
                    textPop(sniper.x, sniper.y - 30, "PROTECTED", "#bb66ff");
                    addChat("Erim SHIELDED Lennard");
                }

                if (sniperInDanger) {
                    moveX += n.x * 1.5;
                    moveY += n.y * 1.5;
                } else {
                    if (d > 90) { moveX += n.x * 0.7; moveY += n.y * 0.7; }
                    moveX += -n.y * 0.3; moveY += n.x * 0.3;
                }

                if (d < 95 && r.slashCd <= 0) {
                    r.slashCd = 650;
                    damage(robin, 11 * r.damageBuff, r.x, r.y);
                }
                if (d > 120 && d < 280 && r.leapCd <= 0) {
                    r.leapCd = 4200;
                    r.vx += n.x * 8;
                    r.vy += n.y * 8;
                    damage(robin, 22 * r.damageBuff, r.x, r.y);
                    burst(r.x, r.y, "#ffee55", 18);
                    addChat("Erim LEAPED");
                }
            }
            // ---------- SNIPER ----------
            else if (r.role === "sniper") {
                r.snipeCd -= dt;
                r.panicShotCd -= dt;
                r.dodgeCd -= dt;

                if (sniperInDanger) {
                    moveX -= n.x * 1.8;
                    moveY -= n.y * 1.8;
                } else if (d < 320) {
                    moveX -= n.x * 1.2;
                    moveY -= n.y * 1.2;
                }
                moveX += -n.y * 0.18; moveY += n.x * 0.18;

                if (d > 180 && r.snipeCd <= 0) {
                    r.snipeCd = 550;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx), 10, 8 * r.damageBuff, "#66ccff", 4);
                }
                if (d < 120 && r.panicShotCd <= 0) {
                    r.panicShotCd = 3200;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx), 14, 32 * r.damageBuff, "#ffee55", 8, "rail");
                    r.vx -= n.x * 10; r.vy -= n.y * 10;
                    burst(r.x, r.y, "#ffee55", 22);
                    addChat("Lennard PANIC SHOT");
                }
                if (d < 100 && r.dodgeCd <= 0) {
                    r.dodgeCd = 2400;
                    r.vx -= n.x * 12; r.vy -= n.y * 12;
                }
            }

            // Map boundaries
            const margin = 170;
            if (r.x < margin) moveX += 1;
            if (r.x > canvas.width - margin) moveX -= 1;
            if (r.y < margin) moveY += 1;
            if (r.y > canvas.height - margin) moveY -= 1;

            // Powerup seeking
            let pTarget = null;
            if (r.hp < r.maxHp * 0.6) pTarget = getNearestPowerup(r, "heal");
            if (!pTarget && !sniperInDanger) pTarget = getNearestPowerup(r, null, 250);
            if (pTarget) {
                const pn = norm(pTarget.x - r.x, pTarget.y - r.y);
                const weight = (pTarget.type === "heal" && r.hp < r.maxHp * 0.6) ? 1.5 : 0.7;
                moveX += pn.x * weight;
                moveY += pn.y * weight;
            }

            r.vx += moveX * 0.12;
            r.vy += moveY * 0.12;
            r.vx *= 0.93;
            r.vy *= 0.93;
            r.x += r.vx * 2.2 * r.speedBuff;
            r.y += r.vy * 2.2 * r.speedBuff;
            r.x = clamp(r.x, 30, canvas.width - 30);
            r.y = clamp(r.y, 30, canvas.height - 30);

            if (!robin.alive && !robinVictory) {
                r.dance += dt * 0.01;
                r.x += Math.sin(r.dance) * 2;
                r.y += Math.cos(r.dance * 2) * 2;
            }
        }

        // ---------- PROJECTILES ----------
        function updateProjectiles(dt) {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;

                // Heal bomb explosion logic
                if (p.type === "healBomb" && p.life < 120) {
                    const healAmt = p.healAmount || 30;
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist(p, r) < 90) heal(r, healAmt);
                    }
                    burst(p.x, p.y, "#88ff88", 16);
                    projectiles.splice(i, 1);
                    continue;
                }

                // Out of bounds
                if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) {
                    projectiles.splice(i, 1);
                    continue;
                }

                // Hit Robin
                if (p.owner !== robin && robin.alive && dist(p, robin) < robin.size * 0.45) {
                    damage(robin, p.damage, p.x, p.y);
                    projectiles.splice(i, 1);
                    continue;
                }

                // Hit runners (Robin's projectiles)
                if (p.owner === robin) {
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist(p, r) < r.size * 0.45) {
                            damage(r, p.damage, p.x, p.y);
                            projectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                if (p.life <= 0) projectiles.splice(i, 1);
            }
        }

        // ---------- POWERUPS ----------
        function updatePowerups(dt) {
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.pulse += dt * 0.004;
                if (robin.alive && dist(robin, p) < 50) {
                    applyPowerup(robin, p.type);
                    powerups.splice(i, 1); spawnPowerup();
                    continue;
                }
                let collected = false;
                for (const r of runners) {
                    if (!r.alive) continue;
                    if (dist(r, p) < 35) {
                        applyPowerup(r, p.type);
                        powerups.splice(i, 1); spawnPowerup();
                        collected = true;
                        break;
                    }
                }
                if (collected) continue;
            }
        }

        function applyPowerup(entity, type) {
            switch (type) {
                case "heal":
                    heal(entity, entity.maxHp * 0.3);
                    break;
                case "speed":
                    entity.speedBuff = 1.35;
                    setTimeout(() => { entity.speedBuff = 1; }, 7000);
                    textPop(entity.x, entity.y, "SPD", "#66ccff");
                    break;
                case "damage":
                    entity.damageBuff = 1.5;
                    setTimeout(() => { entity.damageBuff = 1; }, 7000);
                    textPop(entity.x, entity.y, "DMG", "#ff6666");
                    break;
                case "shield":
                    entity.shield = Math.min(40, entity.shield + 20);
                    textPop(entity.x, entity.y, "SHIELD", "#bb66ff");
                    break;
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.97; p.vy *= 0.97;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                t.y += t.vy;
                t.life--;
                if (t.life <= 0) texts.splice(i, 1);
            }
            // Chat messages decay
            for (let i = chatMessages.length - 1; i >= 0; i--) {
                chatMessages[i].life -= dt;
                if (chatMessages[i].life <= 0) chatMessages.splice(i, 1);
            }
        }

        // ---------- VICTORY CONDITION ----------
        function checkVictory() {
            if (robinVictory) return;
            if (!robin.alive) return;
            const allDead = runners.every(r => !r.alive);
            if (allDead) {
                robinVictory = true;
                victoryTimer = VICTORY_DURATION;
                addShake(20);
                addChat("Robin WINS!");
                burst(robin.x, robin.y, "#cc00ff", 120);
                textPop(robin.x, robin.y - 50, "ROBIN WINS!", "#cc00ff");
                // Prevent further damage during victory
                robin.immunity = VICTORY_DURATION;
            }
        }

        function restartGame() {
            robinVictory = false;
            victoryTimer = 0;
            // Respawn all runners
            for (const r of runners) {
                if (!r.alive) {
                    r.alive = true;
                    r.hp = r.maxHp;
                    r.ghostHp = r.maxHp;
                    r.immunity = 2000;
                    r.x = rand(100, canvas.width - 100);
                    r.y = rand(100, canvas.height - 100);
                }
            }
            // Heal robin if alive, otherwise no change
            if (robin.alive) {
                robin.hp = robin.maxHp;
                robin.ghostHp = robin.maxHp;
            }
            burst(robin.x, robin.y, "#ffffff", 60);
        }

        // ---------- RENDERING ----------
        function drawArena() {
            const t = performance.now() * 0.015;
            ctx.strokeStyle = "rgba(255,255,255,0.04)";
            for (let x = -50; x < canvas.width + 50; x += 50) {
                ctx.beginPath(); ctx.moveTo(x + (t % 50), 0); ctx.lineTo(x + (t % 50), canvas.height); ctx.stroke();
            }
            for (let y = -50; y < canvas.height + 50; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y + (t % 50)); ctx.lineTo(canvas.width, y + (t % 50)); ctx.stroke();
            }
        }

        function drawImage(img, x, y, size, glow, alpha = 1, rot = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.globalAlpha = alpha;
            ctx.shadowColor = glow;
            ctx.shadowBlur = 25;
            ctx.drawImage(img, -size / 2, -size / 2, size, size);
            ctx.restore();
        }

        function drawHealth(entity, color, dt) {
            if (entity.ghostHp === undefined) entity.ghostHp = entity.hp;
            if (entity.ghostHp > entity.hp) entity.ghostHp -= (entity.maxHp * 0.001 * dt);
            if (entity.ghostHp < entity.hp) entity.ghostHp = entity.hp;
            ctx.fillStyle = "#000";
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50, 6);
            ctx.fillStyle = "#fff";
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50 * (entity.ghostHp / entity.maxHp), 6);
            ctx.fillStyle = color;
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50 * (entity.hp / entity.maxHp), 6);
        }

        function drawScoreboard() {
            if (!infiniteMode) return;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(canvas.width / 2 - 120, 15, 240, 40);
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.strokeRect(canvas.width / 2 - 120, 15, 240, 40);
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "center";
            ctx.fillText(`Runners Dead: ${pDeaths}   |   Robins Slain: ${rDeaths}`, canvas.width / 2, 41);
            ctx.textAlign = "left";
        }

        function drawChat() {
            const startY = 20;
            for (let i = 0; i < chatMessages.length; i++) {
                const msg = chatMessages[i];
                const alpha = Math.min(1, msg.life / 1500); // fade out last 1.5s
                ctx.globalAlpha = alpha;
                ctx.fillStyle = "white";
                ctx.font = "bold 14px monospace";
                ctx.fillText(msg.text, 20, startY + i * 22);
            }
            ctx.globalAlpha = 1;
        }

        function render(dt) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Camera shake
            let shakeX = 0, shakeY = 0;
            if (cameraShakeOn && shakeIntensity > 0.1) {
                shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeIntensity *= 0.9; // decay
            }
            ctx.save();
            ctx.translate(shakeX, shakeY);

            drawArena();

            // Powerups
            for (const p of powerups) {
                let color = "#66ccff";
                if (p.type === "heal") color = "#66ff99";
                if (p.type === "damage") color = "#ff6666";
                if (p.type === "shield") color = "#bb66ff";
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 20;
                ctx.arc(p.x, p.y, 12 + Math.sin(p.pulse) * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 45;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Projectiles
            for (const p of projectiles) {
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 16;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Robin slam telegraph
            if (robin.slamTelegraph) {
                const progress = 1 - robin.slamTelegraph.remaining / robin.slamTelegraph.total;
                const radius = 160 * progress;
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,0,0,0.7)";
                ctx.lineWidth = 3;
                ctx.arc(robin.slamTelegraph.x, robin.slamTelegraph.y, radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.lineWidth = 1;
            }

            // Robin
            if (robin.alive) {
                const bossGlow = robin.phase === 2 ? "#cc00ff" : "#ff4444";
                const immunityFlash = (robin.immunity > 0 && Math.sin(performance.now() * 0.02) > 0) ? 0.4 : 1;
                drawImage(imgs.robin, robin.x, robin.y, robin.size, bossGlow, immunityFlash, robin.facing * 0.08);
                drawHealth(robin, bossGlow, dt);
            } else {
                drawImage(imgs.robin, robin.x, robin.y, robin.size, "#ffffff", 0.3, performance.now() * 0.001);
                if (!infiniteMode) {
                    ctx.fillStyle = "white";
                    ctx.font = "bold 40px Arial";
                    ctx.fillText("ROBIN DEFEATED", canvas.width / 2 - 170, 80);
                }
            }

            // Runners
            for (const r of runners) {
                if (!r.alive) continue;
                let glow = "#66aaff";
                if (r.role === "berserker") glow = "#66ff99";
                if (r.role === "sniper") glow = "#66ccff";
                if (r.role === "support") glow = "#ffd166";
                drawImage(imgs[r.name], r.x, r.y, r.size, glow,
                    r.immunity > 0 ? 0.5 + Math.sin(performance.now() * 0.02) * 0.3 : 1,
                    Math.sin(performance.now() * 0.002 + r.x) * 0.05);
                drawHealth(r, "#66ff99", dt);
                if (!robin.alive && !robinVictory && !infiniteMode) {
                    ctx.strokeStyle = `hsla(${(performance.now() * 0.08 + r.x) % 360},100%,70%,0.7)`;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 32 + Math.sin(r.dance * 4) * 8, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // Texts
            for (const t of texts) {
                ctx.globalAlpha = t.life / 60;
                ctx.fillStyle = t.color;
                ctx.font = "bold 16px Arial";
                ctx.fillText(t.text, t.x, t.y);
            }
            ctx.globalAlpha = 1;

            ctx.restore(); // end shake translation

            // UI elements that stay fixed (not shaken)
            drawScoreboard();
            drawChat();

            // Victory overlay
            if (robinVictory) {
                ctx.fillStyle = `rgba(0,0,0,${0.3 + Math.sin(performance.now()*0.01)*0.1})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#cc00ff";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("ROBIN WINS!", canvas.width / 2, canvas.height / 2);
                ctx.textAlign = "left";
            }
        }

        // ---------- GAME LOOP ----------
        let last = performance.now();
        function loop(now) {
            const dt = now - last;
            last = now;

            if (robinVictory) {
                victoryTimer -= dt;
                if (victoryTimer <= 0) restartGame();
                // During victory, still run visuals but pause AI? Keep movement minimal.
                updateParticles(dt);
                for (const r of runners) if (r.alive) r.dance += dt * 0.01;
                render(dt);
                requestAnimationFrame(loop);
                return;
            }

            updateRobin(dt);
            for (const r of runners) updateRunner(r, dt);
            updateProjectiles(dt);
            updatePowerups(dt);
            updateParticles(dt);
            checkVictory();

            render(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
