<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robin Arena Chase</title>
<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #1e1e2f, #0b0b13);
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        background: rgba(0,0,0,0.35);
        padding: 10px 14px;
        border-radius: 12px;
        backdrop-filter: blur(4px);
        font-size: 14px;
        line-height: 1.5;
    }
</style>
</head>
<body>

<div id="info">
    <b>Robin Hunt Arena</b><br>
    Robin grows after each catch.<br>
    The others respawn with temporary immunity.
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ---------- IMAGE LOADING ----------
function loadImage(src) {
    const img = new Image();
    img.src = src;
    return img;
}

const images = {
    robin: loadImage("robin.jpeg"),
    leif: loadImage("leif.jpeg"),
    lennard: loadImage("lennard.jpeg"),
    erim: loadImage("erim.jpeg")
};

// ---------- UTILS ----------
function rand(min, max) {
    return Math.random() * (max - min) + min;
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

// ---------- ROBIN ----------
const robin = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    size: 70,
    speed: 1.9,
    wobble: 0
};

// ---------- RUNNERS ----------
const names = ["leif", "lennard", "erim"];

const runners = names.map(name => createRunner(name));

function createRunner(name) {
    return {
        name,
        x: rand(100, canvas.width - 100),
        y: rand(100, canvas.height - 100),
        vx: rand(-1, 1),
        vy: rand(-1, 1),
        size: 42,
        speed: rand(2.2, 3.2),
        alive: true,
        immunity: 0,
        respawnTimer: 0,
        personality: rand(0.8, 1.2),
        panic: 0
    };
}

// ---------- PARTICLES ----------
const particles = [];

function spawnParticles(x, y, color, amount=15) {
    for(let i = 0; i < amount; i++) {
        particles.push({
            x,
            y,
            vx: rand(-4,4),
            vy: rand(-4,4),
            life: rand(20,40),
            color,
            size: rand(2,5)
        });
    }
}

// ---------- GAME LOOP ----------
let last = performance.now();

function update(dt) {
    robin.wobble += dt * 0.002;

    // Find nearest alive runner
    let nearest = null;
    let nearestDist = Infinity;

    for (const r of runners) {
        if (!r.alive || r.immunity > 0) continue;

        const d = dist(robin, r);
        if (d < nearestDist) {
            nearestDist = d;
            nearest = r;
        }
    }

    // Robin chases nearest
    if (nearest) {
        const dx = nearest.x - robin.x;
        const dy = nearest.y - robin.y;
        const len = Math.hypot(dx, dy);

        robin.x += (dx / len) * robin.speed;
        robin.y += (dy / len) * robin.speed;
    } else {
        // idle drift
        robin.x += Math.sin(robin.wobble) * 0.5;
        robin.y += Math.cos(robin.wobble * 0.7) * 0.5;
    }

    // Keep robin in arena
    robin.x = Math.max(robin.size/2, Math.min(canvas.width - robin.size/2, robin.x));
    robin.y = Math.max(robin.size/2, Math.min(canvas.height - robin.size/2, robin.y));

    for (const r of runners) {

        if (!r.alive) {
            r.respawnTimer -= dt;

            if (r.respawnTimer <= 0) {
                r.alive = true;
                r.immunity = 3000;

                r.x = rand(100, canvas.width - 100);
                r.y = rand(100, canvas.height - 100);

                spawnParticles(r.x, r.y, "#66ffcc", 25);
            }

            continue;
        }

        if (r.immunity > 0) {
            r.immunity -= dt;
        }

        // AI movement
        const dx = r.x - robin.x;
        const dy = r.y - robin.y;
        const d = Math.hypot(dx, dy);

        // Panic mode when robin gets close
        r.panic = Math.max(0, 1 - d / 300);

        const fleeStrength = r.speed + r.panic * 2.5;

        r.vx += (dx / d) * 0.12 * fleeStrength * r.personality;
        r.vy += (dy / d) * 0.12 * fleeStrength * r.personality;

        // random wandering
        r.vx += rand(-0.05, 0.05);
        r.vy += rand(-0.05, 0.05);

        // damping
        r.vx *= 0.96;
        r.vy *= 0.96;

        r.x += r.vx;
        r.y += r.vy;

        // wall bouncing
        if (r.x < 20 || r.x > canvas.width - 20) r.vx *= -1;
        if (r.y < 20 || r.y > canvas.height - 20) r.vy *= -1;

        r.x = Math.max(20, Math.min(canvas.width - 20, r.x));
        r.y = Math.max(20, Math.min(canvas.height - 20, r.y));

        // Catch check
        if (r.immunity <= 0 && dist(robin, r) < robin.size * 0.45 + r.size * 0.4) {

            r.alive = false;
            r.respawnTimer = rand(2500, 5000);

            robin.size += 7;
            robin.speed += 0.04;

            spawnParticles(r.x, r.y, "#ff5555", 35);
        }
    }

    // Robin slowly shrinks again
    robin.size *= 0.9997;
    robin.size = Math.max(robin.size, 70);

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;

        p.vx *= 0.97;
        p.vy *= 0.97;

        p.life--;

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawArena() {
    // animated grid
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;

    const offset = performance.now() * 0.01;

    for(let x = -50; x < canvas.width + 50; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x + (offset % 50), 0);
        ctx.lineTo(x + (offset % 50), canvas.height);
        ctx.stroke();
    }

    for(let y = -50; y < canvas.height + 50; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y + (offset % 50));
        ctx.lineTo(canvas.width, y + (offset % 50));
        ctx.stroke();
    }
}

function drawCharacter(img, x, y, size, glow, alpha=1) {
    ctx.save();

    ctx.globalAlpha = alpha;

    ctx.shadowColor = glow;
    ctx.shadowBlur = 25;

    ctx.drawImage(img, x - size/2, y - size/2, size, size);

    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawArena();

    // particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / 40;

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.globalAlpha = 1;

    // Robin
    const pulse = Math.sin(robin.wobble * 4) * 4;

    drawCharacter(
        images.robin,
        robin.x,
        robin.y,
        robin.size + pulse,
        "#ff4444"
    );

    // Runners
    for (const r of runners) {

        if (!r.alive) continue;

        let alpha = 1;

        if (r.immunity > 0) {
            alpha = 0.45 + Math.sin(performance.now() * 0.02) * 0.25;
        }

        drawCharacter(
            images[r.name],
            r.x,
            r.y,
            r.size + r.panic * 10,
            r.immunity > 0 ? "#66ffcc" : "#66aaff",
            alpha
        );

        // panic ring
        if (r.panic > 0.25) {
            ctx.strokeStyle = `rgba(255,80,80,${r.panic * 0.5})`;
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.arc(r.x, r.y, r.size * (1.2 + r.panic), 0, Math.PI * 2);
            ctx.stroke();
        }
    }
}

function loop(now) {
    const dt = now - last;
    last = now;

    update(dt);
    render();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
