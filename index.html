<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robin Arena – Tactical Synergy</title>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            background: #0a0a14;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas { display: block; }

        #ui-layer {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }
        .ui-btn {
            background: rgba(10,10,20,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            font-weight: bold;
        }
        .ui-btn:hover { background: rgba(255,255,255,0.15); }
        .ui-btn.active {
            background: rgba(204,0,255,0.4);
            border-color: #cc00ff;
            box-shadow: 0 0 12px #cc00ff;
        }

        #settings-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,35,0.95);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px 30px;
            z-index: 30;
            display: none;
            flex-direction: column;
            gap: 20px;
            color: #fff;
            min-width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        #settings-panel h3 {
            margin: 0 0 10px;
            font-size: 22px;
            text-align: center;
            color: #cc00ff;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-row label {
            font-size: 16px;
        }
        .setting-row select {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .setting-row button {
            background: rgba(204,0,255,0.3);
            border: 1px solid #cc00ff;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .setting-row button.active {
            background: #cc00ff;
        }
        #close-settings {
            align-self: center;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="settings-btn" class="ui-btn">⚙️ Settings</button>
    </div>

    <div id="settings-panel">
        <h3>⚙️ Settings</h3>
        <div class="setting-row">
            <label>Infinite Mode</label>
            <button id="set-inf-toggle" class="">OFF</button>
        </div>
        <div class="setting-row">
            <label>Camera Shake</label>
            <button id="set-shake-toggle" class="active">ON</button>
        </div>
        <div class="setting-row">
            <label>Background</label>
            <select id="bg-select">
                <option value="dark">Dark (default)</option>
                <option value="red">Red Void</option>
                <option value="cyber">Cyber Neon</option>
            </select>
        </div>
        <button id="close-settings">Close</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // ---------- SETTINGS STATE ----------
        let infiniteMode = false;
        let cameraShakeOn = true;
        let backgroundStyle = "dark"; // dark, red, cyber
        let pDeaths = 0;
        let rDeaths = 0;
        let shakeIntensity = 0;
        const MAX_SHAKE = 18;

        // Victory state
        let robinVictory = false;
        let victoryTimer = 0;
        const VICTORY_DURATION = 4000;

        // Chat messages (fade out)
        const chatMessages = [];

        // ---------- UI ELEMENTS ----------
        const settingsBtn = document.getElementById("settings-btn");
        const settingsPanel = document.getElementById("settings-panel");
        const closeSettingsBtn = document.getElementById("close-settings");
        const infToggleBtn = document.getElementById("set-inf-toggle");
        const shakeToggleBtn = document.getElementById("set-shake-toggle");
        const bgSelect = document.getElementById("bg-select");

        settingsBtn.addEventListener("click", () => {
            settingsPanel.style.display = "flex";
        });
        closeSettingsBtn.addEventListener("click", () => {
            settingsPanel.style.display = "none";
        });

        infToggleBtn.addEventListener("click", () => {
            infiniteMode = !infiniteMode;
            infToggleBtn.classList.toggle("active", infiniteMode);
            infToggleBtn.innerText = infiniteMode ? "ON" : "OFF";
            if (infiniteMode && !robin.alive) respawnRobin();
        });

        shakeToggleBtn.addEventListener("click", () => {
            cameraShakeOn = !cameraShakeOn;
            shakeToggleBtn.classList.toggle("active", cameraShakeOn);
            shakeToggleBtn.innerText = cameraShakeOn ? "ON" : "OFF";
        });

        bgSelect.addEventListener("change", () => {
            backgroundStyle = bgSelect.value;
        });

        // ---------- HELPER FUNCTIONS ----------
        function resize() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
        }
        addEventListener("resize", resize);
        resize();

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
        function norm(x, y) {
            const l = Math.hypot(x, y) || 1;
            return { x: x / l, y: y / l };
        }

        function load(src) {
            const i = new Image();
            i.src = src;
            return i;
        }

        const imgs = {
            robin: load("robin.jpeg"),
            leif: load("leif.jpeg"),
            lennard: load("lennard.jpeg"),
            erim: load("erim.jpeg")
        };

        // ---------- GAME OBJECTS ----------
        const particles = [];
        const projectiles = [];
        const powerups = [];
        const texts = [];
        const minions = []; // Robin's summoned minions

        // ---------- ENTITIES ----------
        const robin = {
            x: canvas.width / 2, y: canvas.height / 2,
            vx: 0, vy: 0,
            size: 88,
            hp: 280, maxHp: 280, ghostHp: 280,
            alive: true,
            immunity: 0,
            facing: 0,
            slashCd: 0, orbCd: 0, dashCd: 0, slamCd: 0, cometCd: 0, minionCd: 0,
            shield: 0,
            speedBuff: 1, damageBuff: 1,
            slamTelegraph: null
        };

        const runners = [
            {
                name: "leif", role: "support",
                x: 300, y: 300, vx: 0, vy: 0,
                hp: 90, maxHp: 90, ghostHp: 90,
                size: 44, alive: true, immunity: 2000,
                healBombCd: 0, zapCd: 0, damageBuff: 1, speedBuff: 1, dance: 0
            },
            {
                name: "lennard", role: "sniper",
                x: 900, y: 500, vx: 0, vy: 0,
                hp: 78, maxHp: 78, ghostHp: 78,
                size: 42, alive: true, immunity: 2000,
                snipeCd: 0, panicShotCd: 0, dodgeCd: 0, vanishCd: 0, blinkCd: 0,
                damageBuff: 1, speedBuff: 1, dance: 0,
                invisible: false, invisTimer: 0
            },
            {
                name: "erim", role: "berserker",
                x: 700, y: 700, vx: 0, vy: 0,
                hp: 115, maxHp: 115, ghostHp: 115,
                size: 46, alive: true, immunity: 2000,
                slashCd: 0, leapCd: 0, protectCd: 0, lastStandCd: 0,
                damageBuff: 1, speedBuff: 1, dance: 0,
                lastStandActive: false
            }
        ];

        // ---------- POWERUPS ----------
        function spawnPowerup() {
            const types = ["heal", "speed", "damage", "shield"];
            let px, py;
            do {
                px = rand(80, canvas.width - 80);
                py = rand(80, canvas.height - 80);
            } while (px < 80 || px > canvas.width - 80 || py < 80 || py > canvas.height - 80);
            powerups.push({
                x: px, y: py,
                type: types[Math.floor(Math.random() * types.length)],
                pulse: rand(0, 999)
            });
        }
        for (let i = 0; i < 8; i++) spawnPowerup(); // more powerups

        // ---------- COMBAT & EFFECTS ----------
        function burst(x, y, color, count = 18) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: rand(-5, 5),
                    vy: rand(-5, 5),
                    life: rand(20, 45),
                    color,
                    size: rand(2, 5)
                });
            }
        }

        function textPop(x, y, text, color) {
            texts.push({ x, y, text, color, vy: -1, life: 60 });
        }

        function addChat(text) {
            chatMessages.push({ text, life: 5000 });
            while (chatMessages.length > 5) chatMessages.shift();
        }

        function addShake(amount) {
            if (!cameraShakeOn) return;
            shakeIntensity = Math.min(shakeIntensity + amount, MAX_SHAKE);
        }

        function getNearestPowerup(entity, type = null, maxDist = Infinity) {
            let best = null, minDist = maxDist;
            for (const p of powerups) {
                if (type && p.type !== type) continue;
                const d = dist(entity, p);
                if (d < minDist) { minDist = d; best = p; }
            }
            return best;
        }

        function respawnRobin() {
            robin.alive = true;
            robin.maxHp = 280;
            robin.hp = robin.maxHp;
            robin.ghostHp = robin.maxHp;
            robin.immunity = 1500;
            robin.x = canvas.width / 2;
            robin.y = canvas.height / 2;
            robin.slashCd = robin.orbCd = robin.dashCd = robin.slamCd = robin.cometCd = robin.minionCd = 0;
            robin.slamTelegraph = null;
            burst(robin.x, robin.y, "#cc00ff", 80);
            textPop(robin.x, robin.y - 40, "RESPAWNED!", "#cc00ff");
            addChat("Robin RESPAWNED!");
            addShake(10);
        }

        function damage(target, amount, sourceX, sourceY) {
            if (!target.alive) return;
            if (target.immunity > 0) return;
            if (target.lastStandActive) {
                amount *= 0.5; // 50% damage reduction during Last Stand
            }
            if (target.shield > 0) {
                const absorbed = Math.min(target.shield, amount);
                target.shield -= absorbed;
                amount -= absorbed;
            }
            if (amount <= 0) return;
            target.hp -= amount;
            textPop(target.x, target.y - 20, "-" + Math.round(amount), "#ff7777");
            burst(target.x, target.y, "#ff5555", 10);
            const dx = target.x - sourceX, dy = target.y - sourceY;
            const n = norm(dx, dy);
            target.vx += n.x * amount * 0.03;
            target.vy += n.y * amount * 0.03;

            if (target.hp <= 0) {
                target.hp = 0;
                if (target === robin) {
                    if (infiniteMode) {
                        rDeaths++;
                        respawnRobin();
                    } else {
                        robin.alive = false;
                        burst(robin.x, robin.y, "white", 120);
                        for (const r of runners) if (r.alive) r.dance = rand(0, 100);
                        addShake(15);
                        addChat("Robin DEFEATED!");
                    }
                } else {
                    target.alive = false;
                    target.respawn = rand(10000, 15000); // longer window for Robin
                    pDeaths++;
                    burst(target.x, target.y, "#ff2222", 45);
                    addChat(`${target.name.toUpperCase()} down!`);
                    if (target.lastStandActive) target.lastStandActive = false;
                }
            }
        }

        function heal(entity, amount) {
            entity.hp = Math.min(entity.maxHp, entity.hp + amount);
            textPop(entity.x, entity.y, "+" + Math.round(amount), "#66ff99");
        }

        function shoot(owner, x, y, angle, speed, damageAmount, color, size = 5, type = "bullet", extra = {}) {
            projectiles.push({
                owner, x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                damage: damageAmount, color, size, type, life: 220,
                ...extra
            });
        }

        // ---------- MINION LOGIC ----------
        function spawnMinion(x, y) {
            minions.push({
                x, y,
                hp: 35, maxHp: 35,
                size: 28,
                vx: 0, vy: 0,
                target: null,
                attackCd: 0,
                color: "#9966ff"
            });
        }

        function updateMinions(dt) {
            for (let i = minions.length - 1; i >= 0; i--) {
                const m = minions[i];
                if (m.hp <= 0) {
                    burst(m.x, m.y, "#9966ff", 12);
                    minions.splice(i, 1);
                    continue;
                }
                // Find closest runner
                let target = null, bestDist = Infinity;
                for (const r of runners) {
                    if (!r.alive) continue;
                    const d = dist(m, r);
                    if (d < bestDist) { bestDist = d; target = r; }
                }
                if (target) {
                    const dx = target.x - m.x, dy = target.y - m.y;
                    const d = Math.hypot(dx, dy);
                    const n = norm(dx, dy);
                    if (d > 40) {
                        m.vx += n.x * 0.25;
                        m.vy += n.y * 0.25;
                    }
                    m.vx *= 0.92;
                    m.vy *= 0.92;
                    m.x += m.vx;
                    m.y += m.vy;
                    m.x = clamp(m.x, 50, canvas.width - 50);
                    m.y = clamp(m.y, 50, canvas.height - 50);

                    if (d < 50 && m.attackCd <= 0) {
                        m.attackCd = 700;
                        damage(target, 8, m.x, m.y);
                    }
                }
                m.attackCd -= dt;
                // Minions take damage from player projectiles (handled in projectile update)
            }
        }

        // ---------- ROBIN AI (single phase, smarter) ----------
        function updateRobin(dt) {
            if (!robin.alive) return;
            robin.immunity -= dt;
            const cdMultiplier = 1.0;
            robin.slashCd -= dt * cdMultiplier;
            robin.orbCd -= dt * cdMultiplier;
            robin.dashCd -= dt * cdMultiplier;
            robin.slamCd -= dt * cdMultiplier;
            robin.cometCd -= dt * cdMultiplier;
            robin.minionCd -= dt * cdMultiplier;

            // Slam telegraph
            if (robin.slamTelegraph) {
                robin.slamTelegraph.remaining -= dt;
                if (robin.slamTelegraph.remaining <= 0) {
                    const cx = robin.slamTelegraph.x, cy = robin.slamTelegraph.y;
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist({ x: cx, y: cy }, r) < 160) damage(r, 28, cx, cy);
                    }
                    burst(cx, cy, "#ff4444", 50);
                    addChat("Robin used SLAM!");
                    addShake(14);
                    robin.slamTelegraph = null;
                }
            }

            let target = null, bestDist = Infinity;
            for (const r of runners) {
                if (!r.alive) continue;
                const d = dist(robin, r);
                if (d < bestDist) { bestDist = d; target = r; }
            }
            if (!target) return;

            const dx = target.x - robin.x, dy = target.y - robin.y;
            const d = Math.hypot(dx, dy);
            const n = norm(dx, dy);
            robin.facing = Math.atan2(dy, dx);

            // Intelligent movement: prefer not to be surrounded, slightly kite if multiple close
            let moveX = n.x, moveY = n.y;
            const closeRunners = runners.filter(r => r.alive && dist(robin, r) < 200);
            if (closeRunners.length >= 2) {
                // Move away from center of group
                let cx = 0, cy = 0;
                for (const r of closeRunners) { cx += r.x; cy += r.y; }
                cx /= closeRunners.length; cy /= closeRunners.length;
                const away = norm(robin.x - cx, robin.y - cy);
                moveX += away.x * 0.7;
                moveY += away.y * 0.7;
            }

            // Powerup seeking
            if (robin.hp < robin.maxHp * 0.5) {
                const healP = getNearestPowerup(robin, "heal", 300);
                if (healP) {
                    const pn = norm(healP.x - robin.x, healP.y - robin.y);
                    moveX += pn.x * 1.5;
                    moveY += pn.y * 1.5;
                }
            }

            const moveN = norm(moveX, moveY);
            robin.vx += moveN.x * 0.16;
            robin.vy += moveN.y * 0.16;
            robin.vx *= 0.93;
            robin.vy *= 0.93;
            robin.x += robin.vx * 1.9;
            robin.y += robin.vy * 1.9;
            robin.x = clamp(robin.x, 100, canvas.width - 100);
            robin.y = clamp(robin.y, 100, canvas.height - 100);

            // Abilities with cooldowns
            if (d < 100 && robin.slashCd <= 0) {
                robin.slashCd = 650;
                damage(target, 18, robin.x, robin.y);
                addChat("Robin SLASH");
            }

            if (d > 140 && robin.orbCd <= 0) {
                robin.orbCd = 2300;
                for (let i = -1; i <= 1; i++) {
                    shoot(robin, robin.x, robin.y, robin.facing + i * 0.15, 6.5, 14, "#ff6666", 7, "orb");
                }
                addChat("Robin ORBS");
            }

            if (d > 150 && d < 320 && robin.dashCd <= 0) {
                robin.dashCd = 3800;
                robin.vx += n.x * 10;
                robin.vy += n.y * 10;
                damage(target, 22, robin.x, robin.y);
                addChat("Robin DASH");
                addShake(6);
            }

            // New: Slow Comet (big, slow, dodgeable)
            if (d > 200 && robin.cometCd <= 0) {
                robin.cometCd = 7000;
                const angle = robin.facing + rand(-0.2, 0.2);
                shoot(robin, robin.x, robin.y, angle, 3.2, 45, "#ffaa00", 16, "comet", { isComet: true });
                addChat("Robin COMET");
            }

            // New: Spawn minions
            if (closeRunners.length >= 1 && robin.minionCd <= 0 && minions.length < 4) {
                robin.minionCd = 12000;
                spawnMinion(robin.x + rand(-40, 40), robin.y + rand(-40, 40));
                spawnMinion(robin.x + rand(-40, 40), robin.y + rand(-40, 40));
                addChat("Robin SPAWNED MINIONS");
            }

            if (d < 160 && robin.slamCd <= 0 && !robin.slamTelegraph) {
                robin.slamCd = 8500;
                robin.slamTelegraph = { remaining: 950, total: 950, x: robin.x, y: robin.y };
                addChat("Robin winding up SLAM...");
            }
        }

        // ---------- RUNNER AI (smarter synergy) ----------
        function updateRunner(r, dt) {
            if (!r.alive) {
                r.respawn -= dt;
                if (r.respawn <= 0 && robin.alive) {
                    r.alive = true;
                    r.hp = r.maxHp;
                    r.ghostHp = r.maxHp;
                    r.immunity = 2000;
                    r.x = rand(150, canvas.width - 150);
                    r.y = rand(150, canvas.height - 150);
                    burst(r.x, r.y, "#66ffcc", 35);
                    addChat(`${r.name} respawned.`);
                    if (r.lastStandActive) r.lastStandActive = false;
                }
                return;
            }

            r.immunity -= dt;
            if (r.invisible) {
                r.invisTimer -= dt;
                if (r.invisTimer <= 0) r.invisible = false;
            }

            const dx = robin.x - r.x, dy = robin.y - r.y;
            const d = Math.hypot(dx, dy);
            const n = norm(dx, dy);

            const sniper = runners.find(b => b.role === "sniper");
            const support = runners.find(b => b.role === "support");
            const sniperInDanger = sniper && sniper.alive && sniper.hp < sniper.maxHp * 0.5;
            const selfLow = r.hp < r.maxHp * 0.4;

            let moveX = 0, moveY = 0;

            // ---------- SUPPORT ----------
            if (r.role === "support") {
                r.healBombCd -= dt;
                r.zapCd -= dt;

                // Heal allies if low
                const allies = runners.filter(a => a.alive && a !== r && a.hp < a.maxHp * 0.6);
                if (allies.length > 0 && r.healBombCd <= 0) {
                    const closestLow = allies.reduce((a, b) => dist(r, a) < dist(r, b) ? a : b);
                    const angle = Math.atan2(closestLow.y - r.y, closestLow.x - r.x);
                    shoot(r, r.x, r.y, angle, 5, 0, "#88ff88", 10, "healBomb", { healAmount: 35 });
                    r.healBombCd = 7500;
                    addChat("Leif HEAL BOMB");
                } else {
                    if (d > 180) { moveX += n.x * 0.6; moveY += n.y * 0.6; }
                    if (d < 140) { moveX -= n.x * 0.8; moveY -= n.y * 0.8; }
                    moveX += -n.y * 0.45; moveY += n.x * 0.45;
                }

                if (d < 230 && r.zapCd <= 0) {
                    r.zapCd = 480;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx) + rand(-0.1, 0.1), 7.5, 7, "#ffd166", 5);
                }
            }
            // ---------- BERSERKER (Last Stand, protect) ----------
            else if (r.role === "berserker") {
                r.slashCd -= dt;
                r.leapCd -= dt;
                r.protectCd -= dt;
                r.lastStandCd -= dt;

                // Last Stand: activate when low HP and not on cooldown
                if (selfLow && r.lastStandCd <= 0 && !r.lastStandActive) {
                    r.lastStandActive = true;
                    r.lastStandCd = 25000;
                    textPop(r.x, r.y - 40, "LAST STAND!", "#ffaa00");
                    addChat("Erim enters LAST STAND");
                    setTimeout(() => { r.lastStandActive = false; }, 5000);
                }

                // Protect sniper if in danger and nearby
                if (sniperInDanger && r.protectCd <= 0 && dist(r, sniper) < 220) {
                    sniper.shield = Math.min(40, sniper.shield + 30);
                    r.protectCd = 11000;
                    textPop(sniper.x, sniper.y - 30, "PROTECTED", "#bb66ff");
                    addChat("Erim SHIELDED Lennard");
                }

                if (selfLow) {
                    // Retreat toward support or powerup
                    const healP = getNearestPowerup(r, "heal", 300);
                    if (healP) {
                        const pn = norm(healP.x - r.x, healP.y - r.y);
                        moveX += pn.x * 1.6;
                        moveY += pn.y * 1.6;
                    } else if (support && support.alive) {
                        const sn = norm(support.x - r.x, support.y - r.y);
                        moveX += sn.x * 0.9;
                        moveY += sn.y * 0.9;
                    } else {
                        moveX -= n.x * 1.2;
                        moveY -= n.y * 1.2;
                    }
                } else {
                    if (d > 90) { moveX += n.x * 0.7; moveY += n.y * 0.7; }
                    moveX += -n.y * 0.35; moveY += n.x * 0.35;
                }

                if (d < 95 && r.slashCd <= 0) {
                    r.slashCd = 700;
                    damage(robin, 12, r.x, r.y);
                }
                if (d > 120 && d < 290 && r.leapCd <= 0 && !selfLow) {
                    r.leapCd = 4500;
                    r.vx += n.x * 8;
                    r.vy += n.y * 8;
                    damage(robin, 23, r.x, r.y);
                    burst(r.x, r.y, "#ffee55", 18);
                    addChat("Erim LEAP");
                }
            }
            // ---------- SNIPER (Vanish / Blink) ----------
            else if (r.role === "sniper") {
                r.snipeCd -= dt;
                r.panicShotCd -= dt;
                r.dodgeCd -= dt;
                r.vanishCd -= dt;
                r.blinkCd -= dt;

                // Vanish when Robin is close and not on cooldown
                if (d < 150 && r.vanishCd <= 0 && !r.invisible) {
                    r.invisible = true;
                    r.invisTimer = 2800;
                    r.vanishCd = 14000;
                    addChat("Lennard VANISHED");
                    textPop(r.x, r.y - 30, "VANISH", "#aaaaff");
                }
                // Blink away if in danger and vanish on cooldown
                if (d < 130 && r.blinkCd <= 0 && !r.invisible) {
                    r.blinkCd = 11000;
                    const angle = Math.atan2(r.y - robin.y, r.x - robin.x) + rand(-0.5, 0.5);
                    r.x += Math.cos(angle) * 200;
                    r.y += Math.sin(angle) * 200;
                    r.x = clamp(r.x, 80, canvas.width - 80);
                    r.y = clamp(r.y, 80, canvas.height - 80);
                    burst(r.x, r.y, "#aaaaff", 20);
                    addChat("Lennard BLINKED");
                }

                if (sniperInDanger || selfLow) {
                    moveX -= n.x * 1.9;
                    moveY -= n.y * 1.9;
                } else if (d < 320) {
                    moveX -= n.x * 1.3;
                    moveY -= n.y * 1.3;
                }
                moveX += -n.y * 0.2; moveY += n.x * 0.2;

                if (d > 190 && r.snipeCd <= 0) {
                    r.snipeCd = 600;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx), 10.5, 9, "#66ccff", 4);
                }
                if (d < 130 && r.panicShotCd <= 0) {
                    r.panicShotCd = 3500;
                    shoot(r, r.x, r.y, Math.atan2(dy, dx), 15, 35, "#ffee55", 9, "rail");
                    r.vx -= n.x * 10; r.vy -= n.y * 10;
                    burst(r.x, r.y, "#ffee55", 25);
                    addChat("Lennard PANIC SHOT");
                }
                if (d < 100 && r.dodgeCd <= 0 && !r.invisible) {
                    r.dodgeCd = 2200;
                    r.vx -= n.x * 13; r.vy -= n.y * 13;
                }
            }

            // Boundaries (larger margin)
            const margin = 250;
            if (r.x < margin) moveX += 1.2;
            if (r.x > canvas.width - margin) moveX -= 1.2;
            if (r.y < margin) moveY += 1.2;
            if (r.y > canvas.height - margin) moveY -= 1.2;

            // Powerup seeking
            let pTarget = null;
            if (r.hp < r.maxHp * 0.6) pTarget = getNearestPowerup(r, "heal");
            if (!pTarget && !selfLow) pTarget = getNearestPowerup(r, null, 260);
            if (pTarget) {
                const pn = norm(pTarget.x - r.x, pTarget.y - r.y);
                const weight = (pTarget.type === "heal" && r.hp < r.maxHp * 0.6) ? 1.5 : 0.8;
                moveX += pn.x * weight;
                moveY += pn.y * weight;
            }

            r.vx += moveX * 0.13;
            r.vy += moveY * 0.13;
            r.vx *= 0.93;
            r.vy *= 0.93;
            r.x += r.vx * 2.3 * r.speedBuff;
            r.y += r.vy * 2.3 * r.speedBuff;
            r.x = clamp(r.x, 40, canvas.width - 40);
            r.y = clamp(r.y, 40, canvas.height - 40);

            if (!robin.alive && !robinVictory) {
                r.dance += dt * 0.01;
                r.x += Math.sin(r.dance) * 2;
                r.y += Math.cos(r.dance * 2) * 2;
            }
        }

        // ---------- PROJECTILES (updated for minion damage) ----------
        function updateProjectiles(dt) {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;

                // Heal bomb
                if (p.type === "healBomb" && p.life < 120) {
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist(p, r) < 90) heal(r, p.healAmount || 35);
                    }
                    burst(p.x, p.y, "#88ff88", 16);
                    projectiles.splice(i, 1);
                    continue;
                }

                // Comet explosion (large AoE when hitting edge or expiring)
                if (p.isComet && (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height)) {
                    burst(p.x, p.y, "#ffaa00", 25);
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist(p, r) < 100) damage(r, p.damage, p.x, p.y);
                    }
                    projectiles.splice(i, 1);
                    continue;
                }

                // Minion collision with projectiles (only player projectiles damage minions)
                if (p.owner !== robin) {
                    for (let m of minions) {
                        if (dist(p, m) < m.size * 0.5) {
                            m.hp -= p.damage;
                            projectiles.splice(i, 1);
                            burst(p.x, p.y, p.color, 4);
                            break;
                        }
                    }
                }

                if (p.owner !== robin && robin.alive && dist(p, robin) < robin.size * 0.45) {
                    damage(robin, p.damage, p.x, p.y);
                    projectiles.splice(i, 1);
                    continue;
                }

                if (p.owner === robin) {
                    for (const r of runners) {
                        if (!r.alive) continue;
                        if (dist(p, r) < r.size * 0.45) {
                            damage(r, p.damage, p.x, p.y);
                            projectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                if (p.life <= 0) projectiles.splice(i, 1);
            }
        }

        // ---------- POWERUPS ----------
        function updatePowerups(dt) {
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.pulse += dt * 0.004;
                if (robin.alive && dist(robin, p) < 50) {
                    applyPowerup(robin, p.type);
                    powerups.splice(i, 1); spawnPowerup();
                    continue;
                }
                let collected = false;
                for (const r of runners) {
                    if (!r.alive) continue;
                    if (dist(r, p) < 35) {
                        applyPowerup(r, p.type);
                        powerups.splice(i, 1); spawnPowerup();
                        collected = true;
                        break;
                    }
                }
                if (collected) continue;
            }
        }

        function applyPowerup(entity, type) {
            switch (type) {
                case "heal": heal(entity, entity.maxHp * 0.3); break;
                case "speed":
                    entity.speedBuff = 1.4;
                    setTimeout(() => { entity.speedBuff = 1; }, 7000);
                    textPop(entity.x, entity.y, "SPD", "#66ccff");
                    break;
                case "damage":
                    entity.damageBuff = 1.5;
                    setTimeout(() => { entity.damageBuff = 1; }, 7000);
                    textPop(entity.x, entity.y, "DMG", "#ff6666");
                    break;
                case "shield":
                    entity.shield = Math.min(40, entity.shield + 25);
                    textPop(entity.x, entity.y, "SHIELD", "#bb66ff");
                    break;
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.97; p.vy *= 0.97;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = texts.length - 1; i >= 0; i--) {
                const t = texts[i];
                t.y += t.vy;
                t.life--;
                if (t.life <= 0) texts.splice(i, 1);
            }
            for (let i = chatMessages.length - 1; i >= 0; i--) {
                chatMessages[i].life -= dt;
                if (chatMessages[i].life <= 0) chatMessages.splice(i, 1);
            }
        }

        // ---------- VICTORY CONDITION ----------
        function checkVictory() {
            if (robinVictory) return;
            if (!robin.alive) return;
            if (runners.every(r => !r.alive)) {
                robinVictory = true;
                victoryTimer = VICTORY_DURATION;
                addShake(22);
                addChat("Robin WINS!");
                burst(robin.x, robin.y, "#cc00ff", 150);
                textPop(robin.x, robin.y - 50, "ROBIN WINS!", "#cc00ff");
                robin.immunity = VICTORY_DURATION;
            }
        }

        function restartGame() {
            robinVictory = false;
            victoryTimer = 0;
            for (const r of runners) {
                if (!r.alive) {
                    r.alive = true;
                    r.hp = r.maxHp;
                    r.ghostHp = r.maxHp;
                    r.immunity = 2000;
                    r.x = rand(150, canvas.width - 150);
                    r.y = rand(150, canvas.height - 150);
                }
            }
            if (robin.alive) {
                robin.hp = robin.maxHp;
                robin.ghostHp = robin.maxHp;
            }
            burst(robin.x, robin.y, "#ffffff", 60);
            minions.length = 0;
        }

        // ---------- RENDERING ----------
        function drawBackground() {
            let grad;
            if (backgroundStyle === "red") {
                grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                grad.addColorStop(0, "#3d1a1a");
                grad.addColorStop(0.7, "#180a0a");
                grad.addColorStop(1, "#020000");
            } else if (backgroundStyle === "cyber") {
                grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                grad.addColorStop(0, "#1a1a4d");
                grad.addColorStop(0.6, "#0f0f2a");
                grad.addColorStop(1, "#000011");
            } else {
                grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
                grad.addColorStop(0, "#24243d");
                grad.addColorStop(0.6, "#101018");
                grad.addColorStop(1, "#040406");
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawArena() {
            const t = performance.now() * 0.015;
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for (let x = -50; x < canvas.width + 50; x += 50) {
                ctx.beginPath(); ctx.moveTo(x + (t % 50), 0); ctx.lineTo(x + (t % 50), canvas.height); ctx.stroke();
            }
            for (let y = -50; y < canvas.height + 50; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y + (t % 50)); ctx.lineTo(canvas.width, y + (t % 50)); ctx.stroke();
            }
        }

        function drawImage(img, x, y, size, glow, alpha = 1, rot = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.globalAlpha = alpha;
            ctx.shadowColor = glow;
            ctx.shadowBlur = 25;
            ctx.drawImage(img, -size / 2, -size / 2, size, size);
            ctx.restore();
        }

        function drawHealth(entity, color, dt) {
            if (entity.ghostHp === undefined) entity.ghostHp = entity.hp;
            if (entity.ghostHp > entity.hp) entity.ghostHp -= (entity.maxHp * 0.001 * dt);
            if (entity.ghostHp < entity.hp) entity.ghostHp = entity.hp;
            ctx.fillStyle = "#000";
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50, 6);
            ctx.fillStyle = "#fff";
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50 * (entity.ghostHp / entity.maxHp), 6);
            ctx.fillStyle = color;
            ctx.fillRect(entity.x - 25, entity.y - entity.size / 2 - 16, 50 * (entity.hp / entity.maxHp), 6);
        }

        function drawChat() {
            const startY = 25;
            for (let i = 0; i < chatMessages.length; i++) {
                const msg = chatMessages[i];
                const alpha = Math.min(1, msg.life / 1500);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = "white";
                ctx.font = "bold 13px monospace";
                ctx.fillText(msg.text, 25, startY + i * 24);
            }
            ctx.globalAlpha = 1;
        }

        function render(dt) {
            drawBackground();
            let shakeX = 0, shakeY = 0;
            if (cameraShakeOn && shakeIntensity > 0.1) {
                shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeIntensity *= 0.88;
            }
            ctx.save();
            ctx.translate(shakeX, shakeY);

            drawArena();

            // Powerups
            for (const p of powerups) {
                let color = "#66ccff";
                if (p.type === "heal") color = "#66ff99";
                if (p.type === "damage") color = "#ff6666";
                if (p.type === "shield") color = "#bb66ff";
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 20;
                ctx.arc(p.x, p.y, 12 + Math.sin(p.pulse) * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 45;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Projectiles
            for (const p of projectiles) {
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 16;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Minions
            for (const m of minions) {
                ctx.fillStyle = "#9966ff";
                ctx.shadowColor = "#9966ff";
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size/2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "10px Arial";
                ctx.fillText(Math.ceil(m.hp), m.x-10, m.y-20);
            }

            // Slam telegraph
            if (robin.slamTelegraph) {
                const progress = 1 - robin.slamTelegraph.remaining / robin.slamTelegraph.total;
                const radius = 160 * progress;
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,50,50,0.7)";
                ctx.lineWidth = 3;
                ctx.arc(robin.slamTelegraph.x, robin.slamTelegraph.y, radius, 0, Math.PI*2);
                ctx.stroke();
                ctx.lineWidth = 1;
            }

            // Robin
            if (robin.alive) {
                const glow = "#ff4444";
                const immunityFlash = (robin.immunity > 0 && Math.sin(performance.now()*0.02) > 0) ? 0.4 : 1;
                drawImage(imgs.robin, robin.x, robin.y, robin.size, glow, immunityFlash, robin.facing*0.08);
                drawHealth(robin, glow, dt);
            } else {
                drawImage(imgs.robin, robin.x, robin.y, robin.size, "#ffffff", 0.3, performance.now()*0.001);
                if (!infiniteMode && !robinVictory) {
                    ctx.fillStyle = "white";
                    ctx.font = "bold 40px Arial";
                    ctx.fillText("ROBIN DEFEATED", canvas.width/2-170, 80);
                }
            }

            // Runners
            for (const r of runners) {
                if (!r.alive) continue;
                if (r.invisible) continue; // invisible
                let glow = "#66aaff";
                if (r.role === "berserker") glow = "#66ff99";
                if (r.role === "sniper") glow = "#66ccff";
                if (r.role === "support") glow = "#ffd166";
                drawImage(imgs[r.name], r.x, r.y, r.size, glow,
                    r.immunity > 0 ? 0.5 + Math.sin(performance.now()*0.02)*0.3 : 1,
                    Math.sin(performance.now()*0.002 + r.x)*0.05);
                drawHealth(r, "#66ff99", dt);
                if (r.lastStandActive) {
                    ctx.strokeStyle = "#ffaa00";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.size*0.7, 0, Math.PI*2);
                    ctx.stroke();
                }
                if (!robin.alive && !robinVictory && !infiniteMode) {
                    ctx.strokeStyle = `hsla(${(performance.now()*0.08+r.x)%360},100%,70%,0.7)`;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 32+Math.sin(r.dance*4)*8, 0, Math.PI*2);
                    ctx.stroke();
                }
            }

            // Texts
            for (const t of texts) {
                ctx.globalAlpha = t.life / 60;
                ctx.fillStyle = t.color;
                ctx.font = "bold 16px Arial";
                ctx.fillText(t.text, t.x, t.y);
            }
            ctx.globalAlpha = 1;
            ctx.restore();

            drawChat();
            if (robinVictory) {
                ctx.fillStyle = `rgba(0,0,0,${0.3+Math.sin(performance.now()*0.01)*0.1})`;
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#cc00ff";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("ROBIN WINS!", canvas.width/2, canvas.height/2);
                ctx.textAlign = "left";
            }
        }

        // ---------- GAME LOOP ----------
        let last = performance.now();
        function loop(now) {
            const dt = Math.min(now - last, 35);
            last = now;

            if (robinVictory) {
                victoryTimer -= dt;
                if (victoryTimer <= 0) restartGame();
                updateParticles(dt);
                for (const r of runners) if (r.alive) r.dance += dt*0.01;
                render(dt);
                requestAnimationFrame(loop);
                return;
            }

            updateRobin(dt);
            for (const r of runners) updateRunner(r, dt);
            updateMinions(dt);
            updateProjectiles(dt);
            updatePowerups(dt);
            updateParticles(dt);
            checkVictory();

            render(dt);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
